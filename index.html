<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>quiquevela.es</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding: 4rem 2rem 6rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 4rem;
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 500;
      letter-spacing: -0.03em;
      color: #111;
      line-height: 1;
    }

    .subtitle {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      color: #999;
      font-weight: 400;
    }

    .projects {
      display: flex;
      flex-direction: column;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: #111;
      padding: 1.4rem 0;
      border-top: 1px solid #e8e8e8;
      transition: color 0.15s;
    }

    .card:last-child {
      border-bottom: 1px solid #e8e8e8;
    }

    .card-left {
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
    }

    .card-num {
      font-size: 0.72rem;
      color: #bbb;
      font-family: 'DM Mono', monospace;
      min-width: 1.8rem;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 500;
    }

    .card-arrow {
      font-size: 0.9rem;
      color: #bbb;
      transition: transform 0.2s, color 0.15s;
    }

    .card:hover { color: #000; }
    .card:hover .card-arrow {
      transform: translateX(4px);
      color: #111;
    }

    footer {
      margin-top: 5rem;
      font-size: 0.75rem;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <h1>quiquevela.es</h1>
      <p class="subtitle">Personal projects</p>
    </header>

    <div class="projects">

      <a class="card" href="./madrasa/">
        <div class="card-left">
          <span class="card-num">01</span>
          <span class="card-title">Madrasa — Learn Arabic</span>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a class="card" href="./supply-chain/">
        <div class="card-left">
          <span class="card-num">02</span>
          <span class="card-title">Supply Chain Simulator</span>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a class="card" href="./debt-structure/">
        <div class="card-left">
          <span class="card-num">03</span>
          <span class="card-title">Debt Structure Simulator</span>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a class="card" href="./open-differential/">
        <div class="card-left">
          <span class="card-num">04</span>
          <span class="card-title">Open Differential Simulator</span>
        </div>
        <span class="card-arrow">→</span>
      </a>

    </div>

    <footer>quiquevela.es</footer>

  </div>
</body>
</html>
