l markets — currencies, interest rates, equities, and commodities — based on macroeconomic analysis of national economies and geopolitical events.","application":"A global macro fund anticipates that rising U.S. interest rates will strengthen the dollar and shorts emerging market currencies while going long on U.S. Treasury yields.","topics":["Hedge Funds","Commodities"]},{"id":61,"term":"Event-Driven Strategy","definition":"A hedge fund approach that seeks to profit from pricing inefficiencies that occur around corporate events such as mergers, acquisitions, restructurings, bankruptcies, or spin-offs.","application":"An event-driven hedge fund takes a long position in a merger target announced at $45 per share (currently trading at $42), profiting from the spread if the deal closes.","topics":["Hedge Funds"]},{"id":62,"term":"Merger Arbitrage","definition":"An event-driven strategy that profits from the spread between the current market price of a merger target and the announced acquisition price, capturing the deal spread as risk premium.","application":"Company A is acquiring Company B for $100 per share. Company B's stock trades at $96. A merger arb fund buys Company B shares, capturing the $4 spread if the deal closes successfully.","topics":["Hedge Funds"]},{"id":63,"term":"Convertible Arbitrage","definition":"A strategy that seeks to profit from mispricing between a company's convertible bonds and its underlying equity, typically by going long convertibles and shorting the equity.","application":"A hedge fund identifies a convertible bond trading cheaply relative to its embedded equity option. It buys the convertible and hedges the equity risk by shorting the stock.","topics":["Hedge Funds"]},{"id":64,"term":"Fixed Income Arbitrage","definition":"A strategy that exploits pricing anomalies between related fixed income securities, such as the spread between on-the-run and off-the-run Treasuries, or between similar bonds in different markets.","application":"A hedge fund exploits the yield spread between newly issued 10-year U.S. Treasuries (on-the-run) and older issues (off-the-run) with identical maturities, expecting convergence.","topics":["Hedge Funds"]},{"id":65,"term":"Relative Value Strategy","definition":"A hedge fund approach that seeks to profit from pricing discrepancies between related financial instruments rather than from directional bets on market movements.","application":"A relative value fund buys undervalued corporate bonds while shorting overvalued bonds of similar quality, profiting when the pricing relationship normalizes.","topics":["Hedge Funds"]},{"id":66,"term":"Managed Futures","definition":"A strategy employed by Commodity Trading Advisors (CTAs) that trades liquid futures contracts across asset classes — commodities, currencies, rates, equities — using systematic, trend-following models.","application":"A CTA's trend-following algorithm identifies upward momentum in crude oil futures and downward momentum in equity futures, taking long and short positions accordingly.","topics":["Hedge Funds","Commodities"]},{"id":67,"term":"Commodity Trading Advisor (CTA)","definition":"An individual or firm that manages assets using commodity futures contracts and other derivatives. CTAs are registered with the CFTC and often use systematic, algorithmic trading strategies.","application":"A CTA managing $2 billion uses a momentum-based model to trade diversified futures across 50+ markets, generating returns largely uncorrelated to equities.","topics":["Hedge Funds","Commodities"]},{"id":68,"term":"Systematic Strategy","definition":"A trading approach driven by rules-based, quantitative models that generate investment signals based on price, volume, or fundamental data, without relying on discretionary human judgment.","application":"A quantitative hedge fund uses a systematic strategy that buys futures when a 50-day moving average crosses above the 200-day average across multiple markets.","topics":["Hedge Funds","Portfolio Management"]},{"id":69,"term":"Discretionary Strategy","definition":"An investment approach where portfolio managers use their own judgment, experience, and analysis to make investment decisions, as opposed to following a pre-defined algorithmic ruleset.","application":"A global macro discretionary manager evaluates geopolitical risks, central bank policy, and economic data to manually select currency positions rather than relying on automated signals.","topics":["Hedge Funds","Portfolio Management"]},{"id":70,"term":"Trend Following","definition":"A systematic investment strategy that aims to capture gains by identifying and following established price trends across markets. It buys assets in uptrends and sells (or shorts) assets in downtrends.","application":"A CTA's trend-following model identifies a sustained uptrend in gold prices and establishes long gold futures positions, holding them until the trend reverses.","topics":["Hedge Funds","Commodities","Portfolio Management"]},{"id":71,"term":"Mean Reversion","definition":"A financial theory that asset prices and returns eventually revert to their long-run historical average or mean. Strategies based on mean reversion buy underperformers and sell outperformers expecting reversion.","application":"A statistical arbitrage hedge fund exploits mean reversion in equity pairs, going long the underperforming stock and shorting the outperformer, expecting their price ratio to converge.","topics":["Hedge Funds","Risk Management","Portfolio Management"]},{"id":72,"term":"Statistical Arbitrage (Stat Arb)","definition":"A quantitative strategy that uses statistical methods to identify pricing relationships between securities and trade deviations from historical relationships, expecting reversion to the mean.","application":"A stat arb fund models co-integration between two airline stocks. When the spread widens beyond two standard deviations, it goes long the cheaper and shorts the more expensive stock.","topics":["Hedge Funds"]},{"id":73,"term":"High-Frequency Trading (HFT)","definition":"An automated trading approach using powerful computers to execute a large number of orders at extremely high speeds, profiting from tiny price discrepancies and market microstructure.","application":"An HFT firm places thousands of orders per second to profit from bid-ask spreads and short-lived arbitrage opportunities across multiple exchanges.","topics":["Hedge Funds"]},{"id":74,"term":"Net Exposure","definition":"The difference between a fund's long and short positions, expressed as a percentage of total assets. It indicates directional market risk — the higher the net exposure, the more market-sensitive the portfolio.","application":"A long/short equity fund with 80% long and 50% short has a net exposure of 30%, meaning it has a moderate positive directional bias to equity markets.","topics":["Hedge Funds","Risk Management","Portfolio Management"]},{"id":75,"term":"Gross Exposure","definition":"The total sum of a fund's long and short positions (combined absolute value) as a percentage of NAV. It reflects the total capital deployed and is a measure of leverage.","application":"A hedge fund with 120% long and 80% short positions has a gross exposure of 200%, indicating significant use of leverage relative to its equity base.","topics":["Hedge Funds","Risk Management"]},{"id":76,"term":"Commodity","definition":"A basic good or raw material used in commerce that is interchangeable with other goods of the same type. Commodities are typically categorized as hard (metals, energy) or soft (agricultural products).","application":"Crude oil, gold, wheat, copper, and natural gas are examples of commodities. Institutional investors gain exposure through futures contracts, ETFs, or direct commodity funds.","topics":["Commodities","Foundations of Alternative Investments"]},{"id":77,"term":"Contango","definition":"A market condition where futures prices are higher than the current spot price. This creates a negative roll yield for long-only commodity investors as higher-priced futures are rolled into lower near-term futures.","application":"Crude oil is in contango when the 3-month futures price is $5 above the spot price. An ETF holding crude oil futures loses money rolling futures forward even if spot prices remain flat.","topics":["Commodities"]},{"id":78,"term":"Backwardation","definition":"A market condition where futures prices are below the current spot price. This creates a positive roll yield for long-only investors as lower-priced futures are rolled at a profit relative to the current contract.","application":"During oil supply disruptions, backwardation emerges as near-term demand is high. A commodity fund benefits from positive roll yield by holding futures contracts in backwardation.","topics":["Commodities"]},{"id":79,"term":"Roll Yield","definition":"The gain or loss generated from rolling a futures contract forward to the next contract period. Positive in backwardation, negative in contango. It is a key component of total commodity futures returns.","application":"A long-only commodity index investor in backwardated oil contracts earns a positive roll yield as they sell expiring contracts at higher prices and buy cheaper forward contracts.","topics":["Commodities"]},{"id":80,"term":"Spot Price","definition":"The current market price at which a commodity or financial instrument can be bought or sold for immediate delivery and payment.","application":"The spot price of gold today is $2,100/oz. A jeweler buying gold for immediate use pays the spot price, while a speculator hedging future purchases uses futures contracts.","topics":["Commodities","Foundations of Alternative Investments"]},{"id":81,"term":"Futures Contract","definition":"A standardized legal agreement to buy or sell a specific commodity or financial instrument at a predetermined price at a specified time in the future. Traded on regulated exchanges.","application":"A corn farmer sells corn futures at $5.50/bushel for a December delivery to lock in prices, hedging against the risk of a price decline before harvest.","topics":["Commodities","Hedge Funds","Risk Management"]},{"id":82,"term":"Forward Contract","definition":"A customized contract between two parties to buy or sell an asset at a specified future date at a price agreed upon today. Unlike futures, forwards are traded OTC and are not standardized.","application":"A multinational corporation enters into a forward contract to sell €10 million at 1.10 USD/EUR in 90 days to eliminate foreign exchange risk on a European receivable.","topics":["Commodities","Risk Management","Hedge Funds"]},{"id":83,"term":"Options Contract","definition":"A financial derivative that gives the buyer the right, but not the obligation, to buy (call option) or sell (put option) an underlying asset at a specified price on or before a specific date.","application":"An investor buys a put option on crude oil futures at a strike price of $80/barrel to hedge against a price decline in their physical oil inventory.","topics":["Commodities","Hedge Funds","Risk Management"]},{"id":84,"term":"Convenience Yield","definition":"The premium or benefit of holding physical inventory of a commodity rather than holding a futures contract. It reflects the value of having the commodity available for immediate use.","application":"A refinery holds physical crude oil rather than futures contracts because the convenience yield (ability to maintain production) exceeds the cost of carry, especially during supply disruptions.","topics":["Commodities"]},{"id":85,"term":"Cost of Carry","definition":"The total cost associated with holding a position in a financial instrument or physical commodity, including storage, insurance, financing costs, and opportunity costs.","application":"The cost of carry for gold includes storage vault fees and financing costs. High cost of carry (with no convenience yield) pushes gold futures into contango.","topics":["Commodities","Foundations of Alternative Investments"]},{"id":86,"term":"Commodity Index","definition":"A benchmark that tracks the performance of a basket of commodity futures contracts. Major commodity indices include the S&P GSCI, Bloomberg Commodity Index (BCOM), and Deutsche Bank Liquid Commodity Index (DBLCI).","application":"An institutional investor gains broad commodity exposure by investing in a fund that tracks the Bloomberg Commodity Index, which provides diversified exposure across energy, metals, and agriculture.","topics":["Commodities","Portfolio Management"]},{"id":87,"term":"Hard Commodities","definition":"Natural resources that must be mined or extracted, including precious metals (gold, silver), industrial metals (copper, aluminum), and energy (crude oil, natural gas, coal).","application":"A commodities hedge fund goes long copper futures, anticipating increased demand driven by global electrification and EV adoption, as copper is a key hard commodity in energy infrastructure.","topics":["Commodities"]},{"id":88,"term":"Soft Commodities","definition":"Agricultural products or livestock that are grown rather than mined. Examples include wheat, corn, soybeans, cotton, sugar, coffee, and cocoa.","application":"A global macro fund takes long positions in soybean futures after drought forecasts in South America threaten supply, expecting soft commodity prices to rise.","topics":["Commodities"]},{"id":89,"term":"Energy Commodities","definition":"A subset of commodities relating to energy production and consumption, including crude oil (WTI and Brent), natural gas, heating oil, gasoline, and coal.","application":"A CTA takes long positions in WTI crude oil futures after OPEC+ announces production cuts, expecting tighter supply to push energy commodity prices higher.","topics":["Commodities","Hedge Funds"]},{"id":90,"term":"Precious Metals","definition":"Rare, naturally occurring metallic elements with high economic value, including gold, silver, platinum, and palladium. They are used as stores of value, inflation hedges, and in industrial applications.","application":"During high inflation periods, investors allocate to gold as a precious metal hedge. Gold historically maintains purchasing power when fiat currencies depreciate.","topics":["Commodities","Real Assets"]},{"id":91,"term":"Real Assets","definition":"Physical or tangible assets that have intrinsic value due to their substance and properties, including real estate, infrastructure, timber, farmland, and commodities. They often provide inflation protection.","application":"A pension fund invests 15% of its portfolio in real assets — split among infrastructure, real estate, and timber — seeking inflation protection and stable cash flows.","topics":["Real Assets","Foundations of Alternative Investments"]},{"id":92,"term":"Infrastructure","definition":"Physical systems and facilities essential to the economy, including transportation networks, utilities, energy infrastructure, telecommunications, and social infrastructure. Infrastructure assets generate stable, long-term cash flows.","application":"A sovereign wealth fund acquires a 25% stake in a toll road consortium, gaining exposure to long-duration, inflation-linked cash flows with minimal operational risk.","topics":["Real Assets","Foundations of Alternative Investments"]},{"id":93,"term":"Real Estate Investment Trust (REIT)","definition":"A company that owns, operates, or finances income-producing real estate. REITs must distribute at least 90% of taxable income to shareholders and are required to be publicly traded.","application":"An investor seeking real estate exposure without direct property ownership buys shares in a healthcare REIT that owns senior living facilities across multiple states.","topics":["Real Assets"]},{"id":94,"term":"Cap Rate (Capitalization Rate)","definition":"A rate used to estimate the return on a real estate investment, calculated as net operating income (NOI) divided by the property's current market value. A higher cap rate indicates higher yield but often more risk.","application":"A real estate investor evaluating a $5M office building with $300,000 in NOI calculates a 6% cap rate. Comparing this to market cap rates helps determine if the property is fairly valued.","topics":["Real Assets"]},{"id":95,"term":"Net Operating Income (NOI)","definition":"A real estate metric representing a property's gross revenue minus all operating expenses (excluding debt service and taxes). It is the key metric for valuing income-producing real estate.","application":"A multifamily apartment complex generates $1.2M in rental income and incurs $400K in operating expenses, resulting in an NOI of $800K used to value the property at 5% cap rate = $16M.","topics":["Real Assets"]},{"id":96,"term":"Core Real Estate","definition":"The lowest-risk real estate strategy targeting stable, fully leased properties in prime locations with investment-grade tenants. It generates mostly income returns with minimal capital appreciation.","application":"A pension fund invests in core real estate — a Class A office building in Manhattan leased to Fortune 500 companies on long-term leases — seeking predictable income with minimal risk.","topics":["Real Assets"]},{"id":97,"term":"Value-Add Real Estate","definition":"A real estate strategy that targets properties requiring improvement through renovation, re-tenanting, or better management. Investors accept moderate risk in exchange for higher potential returns.","application":"A real estate PE fund acquires an underperforming retail center, upgrades common areas, repositions the tenant mix, and increases NOI, targeting 12–15% IRR versus 6% for core assets.","topics":["Real Assets","Private Equity"]},{"id":98,"term":"Opportunistic Real Estate","definition":"The highest-risk real estate strategy targeting properties requiring significant redevelopment, ground-up construction, or distressed situations. Investors expect the highest returns as compensation for risk.","application":"A real estate fund acquires a distressed hotel in a high-growth city, completes a full gut renovation and repositioning, targeting 20%+ IRR from a combination of income and appreciation.","topics":["Real Assets","Private Equity"]},{"id":99,"term":"Timberland Investment","definition":"Investment in forested land and timber production, generating returns from biological tree growth, timber harvesting, and land appreciation. It offers inflation protection and diversification benefits.","application":"An endowment invests in a timberland fund that acquires forests in the U.S. Southeast. The fund earns income from selling timber and benefits from land value appreciation over 15 years.","topics":["Real Assets","Commodities"]},{"id":100,"term":"Farmland Investment","definition":"Investment in agricultural land used for crop production or livestock, generating returns from rental income, crop sales, and land value appreciation. Farmland provides inflation linkage and portfolio diversification.","application":"A sovereign wealth fund allocates $500 million to a farmland manager that acquires prime agricultural land in the U.S. Midwest, leasing to farmers and earning inflation-linked rental income.","topics":["Real Assets","Commodities"]},{"id":101,"term":"Inflation Hedge","definition":"An investment designed to protect the purchasing power of capital against inflation. Assets that tend to rise with inflation include real estate, commodities, infrastructure, TIPS, and timberland.","application":"A pension fund allocates 10% to real assets as an inflation hedge, recognizing that infrastructure revenues are often contractually linked to CPI, protecting purchasing power of long-term liabilities.","topics":["Real Assets","Commodities","Portfolio Management","Risk Management"]},{"id":102,"term":"Standard Deviation","definition":"A statistical measure of the dispersion of a dataset from its mean. In finance, it is used as a proxy for total risk or volatility of an investment's returns.","application":"A hedge fund with an annualized standard deviation of 8% is considered less volatile than one with 18%, all else equal. Investors use standard deviation to compare risk levels across funds.","topics":["Risk Management","Portfolio Management","Foundations of Alternative Investments"]},{"id":103,"term":"Volatility","definition":"A measure of the rate and magnitude of changes in the price of a security or portfolio. It is commonly measured using standard deviation of returns and is a key input in risk models.","application":"Implied volatility from options markets spiked during the COVID-19 crash (VIX rose above 80), signaling extreme market uncertainty and causing risk parity funds to de-lever.","topics":["Risk Management","Hedge Funds","Portfolio Management"]},{"id":104,"term":"Tail Risk","definition":"The risk of an asset or portfolio experiencing extreme returns (losses or gains) far beyond what is predicted by normal distribution models. Often described as events in the tails of the return distribution.","application":"A risk manager stress-tests a portfolio for tail risk scenarios such as a 2008-style financial crisis, a sudden interest rate spike, or a pandemic-level event to assess potential extreme losses.","topics":["Risk Management","Hedge Funds","Portfolio Management"]},{"id":105,"term":"Skewness","definition":"A statistical measure of the asymmetry of the distribution of returns around the mean. Negative skew means the left tail is longer (more extreme losses), while positive skew means the right tail is longer.","application":"Short volatility strategies often exhibit negative skewness — small, frequent gains but occasional catastrophic losses — which investors must understand before allocating capital.","topics":["Risk Management","Hedge Funds","Portfolio Management"]},{"id":106,"term":"Kurtosis","definition":"A statistical measure of the 'tailedness' of a return distribution relative to a normal distribution. High kurtosis (leptokurtic) indicates fat tails and a higher probability of extreme outcomes.","application":"A credit hedge fund's return distribution exhibits high kurtosis with fat tails, meaning extreme losses (e.g., during credit crises) occur more frequently than a normal distribution would predict.","topics":["Risk Management","Hedge Funds","Portfolio Management"]},{"id":107,"term":"Stress Testing","definition":"A simulation technique used to evaluate how a portfolio or financial institution performs under extreme but plausible adverse market conditions, such as a market crash, currency crisis, or liquidity freeze.","application":"A hedge fund stress tests its multi-strategy portfolio under three scenarios: the 2008 financial crisis, the 2020 COVID crash, and a hypothetical 300bps interest rate spike, to identify concentrated risk exposures.","topics":["Risk Management","Portfolio Management"]},{"id":108,"term":"Scenario Analysis","definition":"A risk management technique that evaluates the impact of specific plausible hypothetical events (e.g., recession, inflation shock, geopolitical crisis) on a portfolio's value.","application":"An endowment runs scenario analysis assuming a 30% equity decline, a 200bps rate rise, and a 20% commodity price drop simultaneously to assess worst-case portfolio impact.","topics":["Risk Management","Portfolio Management"]},{"id":109,"term":"Monte Carlo Simulation","definition":"A computational technique that models the probability distribution of outcomes by running thousands of random simulations using historical or assumed parameters for returns, volatility, and correlations.","application":"A portfolio manager runs 10,000 Monte Carlo simulations to model the probability distribution of a pension fund's 20-year return profile, estimating the likelihood of meeting liability obligations.","topics":["Risk Management","Portfolio Management"]},{"id":110,"term":"Factor Model","definition":"A quantitative model that describes asset returns as a function of exposure to systematic risk factors such as market, size, value, momentum, and quality. Used for risk decomposition and attribution.","application":"A risk analyst uses the Fama-French five-factor model to decompose a hedge fund's returns into market beta, size, value, profitability, and investment factors, identifying that most returns are factor-driven.","topics":["Risk Management","Portfolio Management","Hedge Funds"]},{"id":111,"term":"Systematic Risk","definition":"Market-wide risk that cannot be eliminated through diversification. Also called market risk or undiversifiable risk. Examples include recessions, interest rate changes, and geopolitical events.","application":"During the 2008 financial crisis, virtually all asset classes declined simultaneously, demonstrating that systematic risk cannot be diversified away — even well-diversified portfolios suffered losses.","topics":["Risk Management","Portfolio Management","Foundations of Alternative Investments"]},{"id":112,"term":"Idiosyncratic Risk","definition":"Company-specific or asset-specific risk that can be reduced through diversification. It arises from factors unique to an individual security, such as management decisions, competitive dynamics, or litigation.","application":"A pharmaceutical company's unexpected FDA drug approval rejection is an idiosyncratic risk event, affecting only that stock. A diversified portfolio limits exposure to such events.","topics":["Risk Management","Portfolio Management","Foundations of Alternative Investments"]},{"id":113,"term":"Liquidity Risk","definition":"The risk that an investor may not be able to sell an asset at its fair value within a desired timeframe without significant price impact. Higher for illiquid assets like private equity and real estate.","application":"During the 2008 financial crisis, many hedge fund managers found their supposedly liquid assets became illiquid, forcing them to sell at deep discounts or impose redemption gates.","topics":["Risk Management","Hedge Funds","Foundations of Alternative Investments"]},{"id":114,"term":"Counterparty Risk","definition":"The risk that the other party in a financial transaction will default on their contractual obligations. It is especially relevant in OTC derivatives, securities lending, and repo transactions.","application":"A hedge fund's extensive OTC swap portfolio is exposed to counterparty risk. When Lehman Brothers collapsed in 2008, firms with unhedged Lehman counterparty exposure suffered significant losses.","topics":["Risk Management","Hedge Funds"]},{"id":115,"term":"Credit Risk","definition":"The risk that a borrower or bond issuer will fail to make required principal or interest payments, resulting in a financial loss for the lender or bondholder.","application":"A private credit fund providing direct loans to mid-market companies faces credit risk. The fund mitigates this by structuring senior secured loans with covenants and taking collateral.","topics":["Risk Management","Private Equity","Hedge Funds"]},{"id":116,"term":"Operational Risk","definition":"The risk of loss resulting from inadequate or failed internal processes, systems, people, or external events. It includes fraud, system failures, and regulatory breaches.","application":"The collapse of Amaranth Advisors in 2006 — losing $6 billion in natural gas futures — partly reflected poor risk management and operational controls around position sizing and concentration.","topics":["Risk Management","Hedge Funds"]},{"id":117,"term":"Market Risk","definition":"The risk of losses in a portfolio due to changes in market prices — including equity prices, interest rates, foreign exchange rates, and commodity prices.","application":"A multi-asset hedge fund monitors market risk across all four dimensions: equity price changes, rate sensitivity (duration), FX exposure, and commodity price movements.","topics":["Risk Management","Hedge Funds","Portfolio Management"]},{"id":118,"term":"Duration","definition":"A measure of the sensitivity of a bond's price to changes in interest rates. It represents the weighted average time to receive the bond's cash flows and is expressed in years.","application":"A fixed income hedge fund with a portfolio duration of 7 years will see its portfolio value decline by approximately 7% for every 1% rise in interest rates.","topics":["Risk Management","Hedge Funds","Portfolio Management"]},{"id":119,"term":"Convexity","definition":"A measure of the curvature in the relationship between bond prices and interest rates. It captures the extent to which the price-yield relationship deviates from a straight line (duration).","application":"A hedge fund prefers bonds with positive convexity because they gain more in value when rates fall than they lose when rates rise by the same amount.","topics":["Risk Management","Hedge Funds"]},{"id":120,"term":"Delta","definition":"In options, the rate of change of an option's price with respect to a $1 change in the price of the underlying asset. It ranges from 0 to 1 for calls and -1 to 0 for puts.","application":"A hedge fund with a portfolio delta of 0.5 on its options positions will gain approximately $50,000 for every $100,000 rise in the underlying equity index.","topics":["Risk Management","Hedge Funds"]},{"id":121,"term":"Gamma","definition":"In options, the rate of change of an option's delta with respect to changes in the underlying asset price. High gamma means delta changes rapidly, creating larger hedging requirements.","application":"A market maker with significant short gamma exposure must frequently rebalance their hedge as the underlying moves, becoming a forced buyer or seller in volatile markets.","topics":["Risk Management","Hedge Funds"]},{"id":122,"term":"Vega","definition":"The sensitivity of an option's price to a 1% change in implied volatility. A long vega position benefits from increasing volatility, while a short vega position benefits from declining volatility.","application":"A volatility arbitrage hedge fund identifies that implied volatility on S&P options is historically high and enters short vega positions, expecting volatility to revert lower.","topics":["Risk Management","Hedge Funds"]},{"id":123,"term":"Theta","definition":"The rate of decline in an option's value as it approaches its expiration date, also known as time decay. Long options holders lose value due to theta; short options sellers gain from it.","application":"A hedge fund selling covered calls on equity positions earns positive theta (time value decay) each day the option is held, generating income as long as the stock doesn't move significantly.","topics":["Risk Management","Hedge Funds"]},{"id":124,"term":"Modern Portfolio Theory (MPT)","definition":"A framework developed by Harry Markowitz that shows how rational investors can construct portfolios to maximize expected returns for a given level of risk by combining assets with low correlations.","application":"An investment consultant applies MPT to build an optimal portfolio for a family office, combining equities, bonds, hedge funds, and real assets to achieve the best risk-return trade-off on the efficient frontier.","topics":["Portfolio Management","Foundations of Alternative Investments"]},{"id":125,"term":"Efficient Frontier","definition":"In Modern Portfolio Theory, the set of optimal portfolios that offer the highest expected return for a given level of risk, or the lowest risk for a given expected return.","application":"By adding alternative investments to a traditional equity-bond portfolio, an investment committee moves the portfolio closer to the efficient frontier, achieving better risk-adjusted returns.","topics":["Portfolio Management","Foundations of Alternative Investments"]},{"id":126,"term":"Asset Allocation","definition":"The process of dividing an investment portfolio among different asset categories such as stocks, bonds, real estate, commodities, and alternatives, based on investment goals, risk tolerance, and time horizon.","application":"A university endowment uses a Yale Model-inspired asset allocation with 35% alternatives, 25% equities, 15% real assets, 15% private equity, and 10% fixed income.","topics":["Portfolio Management","Foundations of Alternative Investments"]},{"id":127,"term":"Strategic Asset Allocation (SAA)","definition":"A long-term investment policy that sets target allocations to asset classes based on long-run expected returns, risk, and correlations, rebalancing periodically to maintain targets.","application":"A pension fund's SAA targets 40% global equities, 25% fixed income, 20% alternatives, and 15% real assets, rebalancing quarterly to maintain these long-term targets.","topics":["Portfolio Management","Foundations of Alternative Investments"]},{"id":128,"term":"Tactical Asset Allocation (TAA)","definition":"A dynamic strategy that temporarily deviates from the strategic asset allocation based on short-to-medium term market views, seeking to add value from market timing and valuation signals.","application":"A CIO uses tactical asset allocation to overweight commodities by 5% above the SAA target when inflation expectations rise, then rebalances back after inflation subsides.","topics":["Portfolio Management"]},{"id":129,"term":"Rebalancing","definition":"The process of realigning the weights of the assets in a portfolio to maintain the desired level of asset allocation. This involves buying or selling assets to bring the portfolio back to target weights.","application":"After equities rally 20%, a portfolio's equity allocation increases from 60% to 68%. The manager rebalances by selling equities and buying underweight asset classes back to target.","topics":["Portfolio Management","Risk Management"]},{"id":130,"term":"Endowment Model","definition":"An investment philosophy pioneered by Yale and Harvard that emphasizes heavy allocation to illiquid alternative investments (private equity, VC, hedge funds, real assets) for higher long-term returns.","application":"Following the endowment model, a large university endowment allocates over 60% to alternatives, achieving returns exceeding a traditional 60/40 portfolio over multiple market cycles.","topics":["Portfolio Management","Foundations of Alternative Investments"]},{"id":131,"term":"Risk Parity","definition":"A portfolio construction approach that allocates capital based on equal risk contribution from each asset class rather than equal capital allocation. It typically results in higher bond and lower equity weights, often using leverage.","application":"A risk parity fund allocates 40% to equities, 55% to bonds, and 5% to commodities, then levers up the bond allocation so each asset class contributes equally to portfolio volatility.","topics":["Portfolio Management","Risk Management"]},{"id":132,"term":"Maximum Drawdown","definition":"The maximum observed loss from a peak to a subsequent trough of a portfolio, before a new peak is attained. It is used as an indicator of downside risk.","application":"A hedge fund's maximum drawdown of 22% during the 2020 COVID crash was used by the LP to assess how the manager performs in extreme market stress relative to peers.","topics":["Risk Management","Hedge Funds","Portfolio Management"]},{"id":133,"term":"Information Ratio","definition":"A ratio of portfolio returns above the returns of a benchmark to the volatility of those excess returns. It measures the consistency of alpha generation per unit of active risk.","application":"A long/short equity manager with an information ratio of 0.8 generates consistent excess returns relative to their benchmark, indicating a disciplined and repeatable investment process.","topics":["Portfolio Management","Hedge Funds","Risk Management"]},{"id":134,"term":"Tracking Error","definition":"The standard deviation of the difference between a portfolio's returns and its benchmark's returns. It measures how closely a portfolio follows its benchmark.","application":"A commodity index fund with a tracking error of 0.5% closely replicates its benchmark, while an active commodity manager with 5% tracking error takes significant active bets away from the index.","topics":["Portfolio Management","Risk Management"]},{"id":135,"term":"Benchmark","definition":"A standard against which the performance of a security, fund, or investment manager is measured. Common benchmarks include the S&P 500, MSCI World, and custom peer group medians.","application":"A private equity fund is benchmarked against the Cambridge Associates Global Private Equity Index and the public market equivalent (PME) using the S&P 500.","topics":["Portfolio Management","Foundations of Alternative Investments"]},{"id":136,"term":"Public Market Equivalent (PME)","definition":"A method to compare private fund performance against a public market benchmark by replicating PE cash flows (calls and distributions) in a comparable public index, adjusting for timing.","application":"A PE fund is evaluated using PME against the Russell 2000. If the fund's PME is 1.2, it generated 20% more value than would have been achieved by investing in the small-cap public index.","topics":["Private Equity","Portfolio Management"]},{"id":137,"term":"Absolute Return","definition":"The return that an asset or fund achieves over a period, expressed as a percentage of the initial investment, without comparison to a benchmark. Hedge funds typically target positive absolute returns in all market conditions.","application":"A market-neutral hedge fund targets an absolute return of 8% annually regardless of market direction, distinguishing it from long-only funds that measure performance relative to equity benchmarks.","topics":["Hedge Funds","Portfolio Management"]},{"id":138,"term":"Market Neutral","definition":"A strategy that seeks to generate returns by eliminating market exposure (beta) through offsetting long and short positions, so portfolio returns are driven purely by security selection (alpha).","application":"A market neutral equity fund maintains a net beta close to zero by matching long and short exposures, generating returns from stock picking rather than market direction.","topics":["Hedge Funds","Portfolio Management"]},{"id":139,"term":"Prime Brokerage","definition":"A suite of services provided by investment banks to hedge funds, including securities lending, margin financing, trade execution, and operational support. Prime brokers are central to hedge fund operations.","application":"A multi-strategy hedge fund uses Goldman Sachs as its prime broker for securities lending to support short selling, margin financing for leverage, and consolidated reporting of all positions.","topics":["Hedge Funds"]},{"id":140,"term":"Securities Lending","definition":"The temporary transfer of securities from one party (lender) to another (borrower) for a fee. Hedge funds borrow securities to facilitate short selling. Lenders earn a securities lending fee.","application":"A hedge fund short selling a tech stock borrows shares from its prime broker's securities lending desk, paying a 2% annual fee to borrow and maintain the short position.","topics":["Hedge Funds","Risk Management"]},{"id":141,"term":"Margin","definition":"The amount of equity or collateral deposited with a broker to cover credit risk in leveraged positions. Initial margin is the deposit required to enter a position; variation margin adjusts for daily P&L.","application":"A hedge fund trading commodity futures posts initial margin of 10% of the notional value of futures contracts, and receives or pays variation margin daily based on mark-to-market changes.","topics":["Hedge Funds","Risk Management","Commodities"]},{"id":142,"term":"Margin Call","definition":"A broker's demand that an investor deposit additional money or securities to bring a margin account up to the minimum maintenance margin level, typically triggered by market losses.","application":"A highly leveraged hedge fund experiences a margin call when commodity prices move against it, requiring it to post additional collateral or liquidate positions at unfavorable prices.","topics":["Hedge Funds","Risk Management","Commodities"]},{"id":143,"term":"Mark-to-Market","definition":"The practice of valuing assets and liabilities at their current market price rather than historical cost. It provides a real-time view of a portfolio's value but can create volatility in reported results.","application":"A hedge fund's positions are marked to market daily, with P&L reported based on current market prices. This creates transparency for investors about the fund's current value.","topics":["Hedge Funds","Risk Management","Foundations of Alternative Investments"]},{"id":144,"term":"Fair Value","definition":"An estimate of the price at which an asset could be exchanged between knowledgeable, willing parties in an arm's length transaction. Used for illiquid assets where market prices are unavailable.","application":"A private equity fund uses comparable company analysis and discounted cash flow models to determine the fair value of its portfolio companies for quarterly NAV reporting.","topics":["Private Equity","Foundations of Alternative Investments","Risk Management"]},{"id":145,"term":"Discounted Cash Flow (DCF)","definition":"A valuation method that estimates the value of an investment based on its expected future cash flows discounted back to the present using an appropriate discount rate (WACC or required return).","application":"A PE firm values an infrastructure acquisition by DCF, discounting expected toll revenues over 30 years at a 7% cost of capital, to determine whether the acquisition price represents a fair return.","topics":["Private Equity","Venture Capital","Real Assets","Foundations of Alternative Investments"]},{"id":146,"term":"WACC (Weighted Average Cost of Capital)","definition":"The average rate of return a company must earn on its invested capital to satisfy its investors, weighted by the proportion of each source of capital (debt and equity).","application":"A PE firm calculates a target company's WACC at 9% (6% equity cost + 3% after-tax debt cost) to use as the discount rate in its DCF valuation.","topics":["Private Equity","Foundations of Alternative Investments"]},{"id":147,"term":"Comparable Company Analysis (Comps)","definition":"A valuation method that estimates a company's value by comparing it to publicly traded peers using valuation multiples such as EV/EBITDA, P/E, and EV/Revenue.","application":"A PE firm values a software acquisition target at 10x forward EBITDA based on comparable publicly traded software companies trading at 9x–12x EBITDA.","topics":["Private Equity","Venture Capital"]},{"id":148,"term":"Precedent Transaction Analysis","definition":"A valuation method that estimates a company's value based on multiples paid in prior M&A transactions for comparable companies in the same industry.","application":"A PE fund evaluates acquisition multiples from 10 recent software M&A transactions to benchmark its proposed 11x EBITDA acquisition price as market-reasonable.","topics":["Private Equity","Venture Capital"]},{"id":149,"term":"Accredited Investor","definition":"An individual or institution meeting SEC wealth or income thresholds (e.g., $1M net worth or $200K annual income) that is permitted to invest in private offerings not registered with regulators.","application":"A high-net-worth individual qualifies as an accredited investor with $2M in net worth, enabling them to invest in private equity funds, hedge funds, and other exempt securities offerings.","topics":["Foundations of Alternative Investments","Hedge Funds","Private Equity"]},{"id":150,"term":"Qualified Purchaser","definition":"A higher standard than accredited investor, requiring $5M+ in investments for individuals or $25M+ for institutions. Qualified purchasers can invest in funds with more than 100 investors (3(c)(7) funds).","application":"A family office with $30 million in investments qualifies as a qualified purchaser, allowing it to invest in 3(c)(7) hedge funds that have a larger investor base than 3(c)(1) funds.","topics":["Foundations of Alternative Investments","Hedge Funds"]},{"id":151,"term":"Regulation D (Reg D)","definition":"An SEC exemption from registration requirements that allows private companies and funds to raise capital from accredited investors without filing a registration statement.","application":"A hedge fund uses Reg D Rule 506(b) to raise capital from up to 35 sophisticated non-accredited investors and an unlimited number of accredited investors, avoiding costly SEC registration.","topics":["Foundations of Alternative Investments","Hedge Funds","Private Equity"]},{"id":152,"term":"Private Placement","definition":"The sale of securities to a relatively small number of selected investors without a public offering. It is less regulated than public offerings, providing faster access to capital.","application":"A growth-stage company raises $50 million in a private placement from institutional investors, avoiding the expense and scrutiny of a public IPO.","topics":["Foundations of Alternative Investments","Venture Capital","Private Equity"]},{"id":153,"term":"Subscription Agreement","definition":"The contract signed by an investor to commit capital to a fund. It confirms the investor meets eligibility requirements, acknowledges risks, and sets the terms of the investment.","application":"Before a pension fund can invest in a private equity fund, it completes a detailed subscription agreement, confirming its qualified purchaser status, KYC/AML compliance, and investment parameters.","topics":["Foundations of Alternative Investments","Private Equity","Hedge Funds"]},{"id":154,"term":"Side Letter","definition":"A separate agreement between a fund manager (GP) and a specific investor (LP) that grants the investor special terms not available to other LPs, such as fee discounts, reporting enhancements, or MFN rights.","application":"A large sovereign wealth fund commits $500 million to a PE fund and negotiates a side letter granting 1% management fees (versus 2% for other LPs) and enhanced quarterly reporting.","topics":["Private Equity","Hedge Funds","Foundations of Alternative Investments"]},{"id":155,"term":"Most Favored Nation (MFN) Clause","definition":"A provision in an LP's side letter that entitles the investor to receive any more favorable terms offered to other investors in the same fund.","application":"An endowment with an MFN clause automatically receives a fee reduction when a larger LP negotiates better terms, ensuring all parties with MFN rights benefit from the best available terms.","topics":["Private Equity","Hedge Funds","Foundations of Alternative Investments"]},{"id":156,"term":"Committed Capital","definition":"The total amount of capital that limited partners have agreed to provide to a fund when called by the GP. Capital is not invested upfront but is drawn down as investments are made.","application":"A PE fund closes with $2 billion in committed capital from 30 LPs. Over 5 years, the GP issues capital calls drawing down committed capital as portfolio companies are acquired.","topics":["Private Equity","Foundations of Alternative Investments"]},{"id":157,"term":"Paid-In Capital","definition":"The total capital actually transferred to the fund by LPs in response to capital calls. It equals committed capital minus uncalled capital.","application":"A fund with $1 billion in committed capital has received $600 million in paid-in capital after three years, meaning 40% of LP commitments remain uncalled.","topics":["Private Equity","Foundations of Alternative Investments"]},{"id":158,"term":"Vintage Year","definition":"The year in which a private equity or venture capital fund made its first investment or had its first capital call. Used to benchmark fund performance against peers raised in the same year.","application":"A 2008 vintage PE fund that deployed capital during the financial crisis is compared to other 2008 vintage funds, as market conditions at time of deployment significantly affect performance.","topics":["Private Equity","Venture Capital","Foundations of Alternative Investments"]},{"id":159,"term":"Dry Powder","definition":"Uncommitted capital available for PE and VC funds to deploy into new investments. High levels of dry powder indicate significant capital competition for deals, potentially inflating valuations.","application":"The private equity industry's record $3.7 trillion in dry powder as of 2023 has intensified competition for quality assets, compressing entry multiples and returns for new investments.","topics":["Private Equity","Venture Capital"]},{"id":160,"term":"Growth Equity","definition":"A type of private equity investing that takes minority stakes in established, profitable companies seeking capital for expansion, acquisitions, or to provide liquidity to existing shareholders.","application":"A growth equity fund invests $30 million for a 25% minority stake in a profitable SaaS company growing at 40% annually, providing capital for international expansion.","topics":["Private Equity","Venture Capital"]},{"id":161,"term":"Growth Capital","definition":"Investment capital provided to relatively mature companies looking to expand, restructure operations, enter new markets, or finance a significant acquisition without a change of control.","application":"A PE firm provides $100 million in growth capital to a healthcare services company for acquisition of three regional competitors, accelerating its national roll-up strategy.","topics":["Private Equity"]},{"id":162,"term":"Roll-Up Strategy","definition":"A private equity strategy that involves acquiring multiple small companies in a fragmented industry, consolidating them into a larger entity to achieve economies of scale and higher valuations.","application":"A PE fund acquires 15 independent veterinary clinics, consolidates their back-office operations, and benefits from multiple expansion by selling the combined entity at a higher EBITDA multiple.","topics":["Private Equity"]},{"id":163,"term":"Add-On Acquisition","definition":"An acquisition made by a PE-backed portfolio company to expand its business, as opposed to a standalone platform acquisition. It is a common value creation lever in buyout strategies.","application":"A PE-owned software company completes five add-on acquisitions of smaller competitors over three years, doubling EBITDA and increasing the platform's size before exit.","topics":["Private Equity"]},{"id":164,"term":"Portfolio Company","definition":"A company in which a private equity or venture capital fund has invested. The GP actively manages or oversees portfolio companies to maximize value before exit.","application":"A PE fund's portfolio company — a mid-market packaging manufacturer — implements lean operations, expands sales internationally, and grows EBITDA from $20M to $40M over 4 years.","topics":["Private Equity","Venture Capital"]},{"id":165,"term":"Board Seat","definition":"A position on a company's board of directors held by a PE or VC investor, providing governance rights and oversight of management to protect and grow their investment.","application":"A Series B investor takes two board seats in a startup, providing strategic guidance on hiring a CFO, managing burn rate, and preparing for a future financing round.","topics":["Venture Capital","Private Equity"]},{"id":166,"term":"EBITDA Multiple","definition":"A valuation metric used in PE to express a company's enterprise value as a multiple of its EBITDA. Entry and exit multiples are key drivers of PE investment returns.","application":"A PE fund buys a company at 8x EBITDA and exits 5 years later at 12x EBITDA after improving operations. Multiple expansion contributed 3-4x return just from re-rating at exit.","topics":["Private Equity"]},{"id":167,"term":"Multiple Expansion","definition":"An increase in the valuation multiple of a company between investment and exit. It is one of the key drivers of PE returns alongside earnings growth and debt repayment.","application":"A PE fund acquires a software company at 8x EBITDA. By the time of exit, cloud software companies re-rated to 14x EBITDA, generating significant multiple expansion returns.","topics":["Private Equity"]},{"id":168,"term":"Debt Paydown","definition":"The reduction of LBO debt over the life of a PE investment using the portfolio company's operating cash flows. It increases equity value as the debt decreases on a fixed-value enterprise.","application":"In a buyout financed with 60% debt, the portfolio company uses its cash flows to reduce debt from $300M to $150M over 5 years. This debt paydown alone creates $150M in additional equity value.","topics":["Private Equity"]},{"id":169,"term":"Distressed Investing","definition":"A strategy that invests in the securities (debt or equity) of companies facing severe financial or operational difficulties, typically trading at a significant discount to intrinsic value.","application":"A distressed hedge fund acquires secured bonds of a retail chain at 40 cents on the dollar, then takes control through restructuring and sells the recovered business at par, generating 2.5x returns.","topics":["Private Equity","Hedge Funds"]},{"id":170,"term":"Special Situations","definition":"Investments in companies undergoing events such as restructurings, spin-offs, recapitalizations, regulatory changes, or bankruptcies that create temporary mispricing or value opportunities.","application":"A special situations fund invests in a conglomerate conducting a complex spin-off, anticipating the market to undervalue the newly created subsidiary and profiting when the mispricing corrects.","topics":["Private Equity","Hedge Funds"]},{"id":171,"term":"Credit Default Swap (CDS)","definition":"A financial derivative in which the buyer pays periodic premiums to the seller in exchange for compensation if a specified credit event (default, restructuring) occurs on a reference entity's debt.","application":"A hedge fund buys CDS protection on a high-yield issuer it expects to default, paying 500bps annually. If the company defaults, the fund receives par value for the bonds it references.","topics":["Hedge Funds","Risk Management"]},{"id":172,"term":"Swap","definition":"A derivative contract in which two parties agree to exchange cash flows or other financial instruments over a specified period. Common types include interest rate swaps, currency swaps, and total return swaps.","application":"A hedge fund enters a total return swap on a commodity index, receiving the total return of the index while paying LIBOR + spread, gaining commodity exposure without directly holding futures.","topics":["Hedge Funds","Risk Management","Commodities"]},{"id":173,"term":"Interest Rate Swap","definition":"A derivative contract in which two parties agree to exchange fixed interest payments for floating interest payments (or vice versa) on a notional principal amount.","application":"A PE-backed portfolio company with a floating rate LBO loan enters an interest rate swap, paying fixed and receiving floating, protecting against rising interest rates.","topics":["Risk Management","Private Equity","Hedge Funds"]},{"id":174,"term":"Currency Hedge","definition":"A risk management strategy using foreign exchange derivatives (forwards, futures, options) to offset the currency risk arising from investments in foreign-denominated assets.","application":"A U.S. pension fund investing in European PE funds hedges its EUR exposure back to USD using rolling 3-month forward contracts, eliminating currency volatility from its returns.","topics":["Risk Management","Portfolio Management","Private Equity"]},{"id":175,"term":"Private Credit / Direct Lending","definition":"Non-bank lending to private companies, typically in the form of senior secured or unitranche loans. Private credit funds have grown significantly as banks reduced lending post-2008.","application":"A direct lending fund provides a $75 million senior secured loan to a PE-backed healthcare company at SOFR + 600bps, serving as the sole lender without bank syndication.","topics":["Private Equity","Foundations of Alternative Investments"]},{"id":176,"term":"Unitranche","definition":"A blended debt structure combining senior secured and subordinated debt into a single loan facility at a single blended interest rate. It simplifies the capital structure for borrowers.","application":"A PE-backed company uses a $100 million unitranche loan to finance its LBO, avoiding the complexity of separate senior and mezzanine lenders while paying a single blended interest rate of SOFR + 650bps.","topics":["Private Equity"]},{"id":177,"term":"Covenant","definition":"A condition in a credit agreement that borrowers must maintain, such as financial ratio requirements (maintenance covenants) or restrictions on activities (incurrence covenants).","application":"A direct lending fund requires the borrower to maintain a leverage ratio below 5x EBITDA (maintenance covenant). Breach of this covenant triggers lender consultation rights and potential restructuring.","topics":["Private Equity","Risk Management"]},{"id":178,"term":"SOFR (Secured Overnight Financing Rate)","definition":"The benchmark interest rate for U.S. dollar-denominated loans, replacing LIBOR. It is based on transactions in the U.S. Treasury repurchase agreement (repo) market.","application":"Post-LIBOR transition, a PE-backed company's floating rate senior debt is priced at SOFR + 400bps. When SOFR rises from 1% to 5%, the total interest rate increases from 5% to 9%.","topics":["Private Equity","Risk Management","Foundations of Alternative Investments"]},{"id":179,"term":"Credit Spread","definition":"The yield differential between a corporate or other non-government bond and a comparable maturity risk-free government bond. It represents the compensation investors demand for credit risk.","application":"A high-yield bond offers a credit spread of 450bps over Treasuries. When the issuer's creditworthiness deteriorates, the spread widens to 700bps, reducing the bond's price.","topics":["Risk Management","Private Equity","Hedge Funds"]},{"id":180,"term":"High-Yield Bond (Junk Bond)","definition":"A bond rated below investment grade (below BBB-/Baa3 by rating agencies) due to higher credit risk. It offers higher yields to compensate investors for the additional default risk.","application":"A PE-backed LBO issues $300 million in high-yield bonds at 8% to fund the acquisition. These bonds, rated B+, offer a 400bps spread over investment-grade bonds of similar maturity.","topics":["Private Equity","Hedge Funds"]},{"id":181,"term":"Capital Structure","definition":"The mix of debt and equity used to finance a company's assets. In PE, structuring capital efficiently — including senior debt, mezzanine, and equity — is a key source of value creation.","application":"A PE buyout structures the acquisition with $200M senior debt, $50M mezzanine, and $100M equity. The capital structure is designed to maximize returns while maintaining manageable leverage.","topics":["Private Equity","Risk Management"]},{"id":182,"term":"Recapitalization","definition":"A change in a company's capital structure, often by taking on more debt and using proceeds to pay dividends to equity holders (dividend recapitalization) or to change the debt/equity balance.","application":"A PE fund's portfolio company, having grown EBITDA from $20M to $40M, completes a dividend recapitalization — borrowing $200M against its improved balance sheet to return capital to the PE fund.","topics":["Private Equity"]},{"id":183,"term":"Free Cash Flow (FCF)","definition":"The cash a company generates from operations after capital expenditures, available for debt repayment, dividends, acquisitions, or buybacks. A critical metric in private equity and credit analysis.","application":"A PE fund targets businesses with high free cash flow conversion (FCF/EBITDA above 80%) as they can rapidly repay LBO debt, reducing leverage and creating equity value.","topics":["Private Equity","Foundations of Alternative Investments"]},{"id":184,"term":"Working Capital","definition":"The difference between a company's current assets (cash, receivables, inventory) and current liabilities (payables). It measures operational liquidity and efficiency.","application":"A PE firm identifies that a portfolio company has $30M in excess working capital tied up in slow-moving inventory. Releasing this capital generates cash equivalent to a year of EBITDA.","topics":["Private Equity"]},{"id":185,"term":"Operating Leverage","definition":"The degree to which a company's income is sensitive to changes in revenue, driven by the proportion of fixed versus variable costs. High operating leverage amplifies both profits and losses.","application":"A manufacturing company with 80% fixed costs has high operating leverage. A 10% revenue increase results in a 40% EBITDA increase, making it attractive for PE if revenue growth is likely.","topics":["Private Equity","Risk Management"]},{"id":186,"term":"Organic Growth","definition":"Revenue and earnings growth generated from a company's own operations — through new products, new customers, or market share gains — rather than through acquisitions.","application":"A PE-backed software company achieves 25% organic revenue growth by investing in sales headcount and product development, increasing its ARR without making acquisitions.","topics":["Private Equity","Venture Capital"]},{"id":187,"term":"MOIC vs IRR Tradeoff","definition":"The tension between MOIC (total value multiple) and IRR (time-weighted return rate). Holding a good investment longer increases MOIC but may reduce IRR if the holding period extends.","application":"A PE fund holding a company for 3 years at 3x MOIC has a 44% IRR. Holding the same investment for 6 years at 3x MOIC drops the IRR to 20%, illustrating the time-value tradeoff.","topics":["Private Equity","Portfolio Management"]},{"id":188,"term":"Angel Investor","definition":"An individual who provides capital to early-stage startups, typically in exchange for equity or convertible debt. Angel investors often precede institutional VC funding.","application":"An angel investor provides $250,000 to a pre-revenue tech startup in exchange for a convertible note, betting on the founding team before formal VC funding rounds.","topics":["Venture Capital"]},{"id":189,"term":"Convertible Note","definition":"A form of short-term debt used in early-stage financing that converts into equity in the next funding round, typically at a discount to the round price or with a valuation cap.","application":"A startup raises $1M via a convertible note at a 20% discount to Series A pricing. When Series A closes at $10/share, the noteholder converts at $8/share, receiving 25% more equity.","topics":["Venture Capital"]},{"id":190,"term":"SAFE (Simple Agreement for Future Equity)","definition":"A contractual agreement between a startup and an investor where the investor provides capital in exchange for the right to receive equity in a future priced round, without being a loan.","application":"YCombinator-backed startups frequently use SAFEs for seed financing, allowing quick fundraising without complex terms, with conversion triggered at a Series A or liquidity event.","topics":["Venture Capital"]},{"id":191,"term":"Bootstrapping","definition":"The process of building and growing a business using only personal savings, operating cash flows, and revenue without external funding from investors or bank loans.","application":"A software entrepreneur builds a profitable SaaS business over 5 years using only customer revenue, retaining 100% ownership rather than diluting equity through VC funding.","topics":["Venture Capital"]},{"id":192,"term":"Accelerator","definition":"A fixed-term, cohort-based program that provides early-stage startups with mentorship, resources, and often seed funding in exchange for a small equity stake.","application":"A startup joins Y Combinator's accelerator, receiving $500K for 7% equity and access to a powerful alumni network and investor demo day.","topics":["Venture Capital"]},{"id":193,"term":"Product-Market Fit","definition":"The degree to which a product satisfies strong market demand. Achieving product-market fit is a critical milestone for startups as it indicates sustainable growth potential.","application":"A SaaS startup demonstrates product-market fit when its net promoter score exceeds 50, churn falls below 2% monthly, and customers are actively referring new users without incentives.","topics":["Venture Capital"]},{"id":194,"term":"Burn Rate","definition":"The rate at which a company spends its available cash to cover operating expenses before generating positive cash flow from operations. Usually expressed in monthly terms.","application":"A pre-revenue startup with $3M in the bank and a $300K monthly burn rate has 10 months of runway before it needs to raise additional capital.","topics":["Venture Capital"]},{"id":195,"term":"Runway","definition":"The number of months a company can operate before exhausting its current cash reserves, calculated by dividing current cash by monthly burn rate.","application":"A startup with $6M in cash and a $500K monthly burn rate has 12 months of runway, requiring it to either achieve profitability or raise a new funding round within that time.","topics":["Venture Capital"]},{"id":196,"term":"ARR (Annual Recurring Revenue)","definition":"The annualized value of recurring revenue from subscription-based customers. It is a key performance indicator for SaaS and subscription businesses.","application":"A SaaS startup with 500 customers paying $2,000/month has an ARR of $12 million. VCs value the company at 10x ARR, implying a $120 million valuation.","topics":["Venture Capital"]},{"id":197,"term":"Customer Acquisition Cost (CAC)","definition":"The total cost of acquiring a new customer, including marketing, sales, and onboarding expenses. A critical efficiency metric for evaluating VC-backed companies.","application":"A startup spends $500K on sales and marketing to acquire 500 new customers, resulting in a $1,000 CAC. If lifetime value (LTV) is $5,000, the LTV/CAC ratio of 5x indicates strong unit economics.","topics":["Venture Capital"]},{"id":198,"term":"Lifetime Value (LTV)","definition":"The total net revenue expected from a customer over the entire duration of their relationship with a company. A high LTV/CAC ratio indicates strong business model economics.","application":"A SaaS company with $200/month ARPU, 2% monthly churn, and 70% gross margins has an LTV of approximately $7,000 per customer.","topics":["Venture Capital"]},{"id":199,"term":"Churn Rate","definition":"The percentage of customers or revenue lost in a given period, typically monthly or annually. High churn destroys recurring revenue and signals product-market fit issues.","application":"A B2B SaaS company with 3% monthly churn loses approximately 30% of its revenue base annually, making growth highly inefficient and concerning to VC investors.","topics":["Venture Capital"]},{"id":200,"term":"Net Revenue Retention (NRR)","definition":"The percentage of recurring revenue retained from existing customers, including expansions and upgrades, minus churn and downgrades. NRR above 100% means existing customers are growing.","application":"A SaaS company with 115% NRR is growing revenue even without acquiring new customers, as existing customers are expanding their usage — a highly attractive metric for VCs.","topics":["Venture Capital"]},{"id":201,"term":"Pro-Rata Rights","definition":"The right of existing investors to maintain their ownership percentage in future funding rounds by participating proportionally in new share issuances.","application":"A VC with 15% pro-rata rights in a startup's Series A can invest proportionally in the Series B to avoid having their stake diluted by new investors.","topics":["Venture Capital"]},{"id":202,"term":"Information Rights","definition":"The contractual rights granted to investors in a private company to receive financial statements, business updates, and other material information about the company's operations.","application":"A Series A investor's information rights entitle them to monthly financial statements, annual audited accounts, and the right to attend and observe board meetings.","topics":["Venture Capital","Private Equity"]},{"id":203,"term":"Drag-Along Rights","definition":"A right held by majority shareholders (often PE or VC investors) to force minority shareholders to join in and sell their shares in an acquisition on the same terms.","application":"A VC fund that agrees to sell a portfolio company can use drag-along rights to compel a dissenting founder holding 5% to sell at the agreed acquisition price.","topics":["Venture Capital","Private Equity"]},{"id":204,"term":"Tag-Along Rights","definition":"A right held by minority shareholders to join in and sell their shares on the same terms and conditions when a majority shareholder sells their stake.","application":"If a PE firm selling its 60% stake in a company at $20/share triggers tag-along rights, minority shareholders can sell their shares at the same $20/share price.","topics":["Venture Capital","Private Equity"]},{"id":205,"term":"Right of First Refusal (ROFR)","definition":"A contractual right giving the holder the first opportunity to match an offer made by a third party before the owner can accept that external offer.","application":"A VC fund with ROFR in a startup can match any third-party acquisition offer before the founder can sell to an outside buyer, allowing the fund to control exit outcomes.","topics":["Venture Capital","Private Equity"]},{"id":206,"term":"Vesting Schedule","definition":"A timeline over which founders or employees earn the right to their equity or stock options, typically over 4 years with a 1-year cliff. It incentivizes retention and long-term commitment.","application":"A startup founder's 20% equity vests over 4 years with a 1-year cliff: 25% vests at the 1-year mark and the remainder vests monthly thereafter.","topics":["Venture Capital","Private Equity"]},{"id":207,"term":"Option Pool","definition":"A portion of equity set aside in a startup's cap table for future grants to employees, advisors, and consultants. It is typically created before VC investment rounds.","application":"Before closing its Series A, a startup creates a 15% employee option pool, which dilutes existing shareholders but satisfies VC requirements that enough equity is available to incentivize future hires.","topics":["Venture Capital"]},{"id":208,"term":"EV/EBITDA","definition":"A valuation multiple calculated by dividing a company's enterprise value by its EBITDA. It is the most commonly used metric for comparing company valuations in M&A and private equity.","application":"In the private equity industry, mid-market buyouts transact at 7–10x EV/EBITDA, while high-quality technology companies can trade at 15–25x EBITDA in competitive auctions.","topics":["Private Equity","Venture Capital","Foundations of Alternative Investments"]},{"id":209,"term":"Price-to-Earnings (P/E) Ratio","definition":"A valuation ratio of a company's share price to its earnings per share. It reflects how much investors are willing to pay for each dollar of earnings.","application":"A hedge fund's long/short equity manager buys a consumer company at a 12x P/E and shorts a competitor at a 25x P/E, betting on valuation convergence.","topics":["Hedge Funds","Foundations of Alternative Investments"]},{"id":210,"term":"Risk-Free Rate","definition":"The theoretical rate of return of an investment with zero risk, typically proxied by the yield on short-term government bonds (e.g., U.S. Treasury bills). It serves as the baseline for required returns.","application":"When the risk-free rate is 5%, investors demand higher expected returns from alternative investments to justify their risks. A private equity fund targeting a 20% IRR offers a 15% risk premium over T-bills.","topics":["Foundations of Alternative Investments","Portfolio Management","Risk Management"]},{"id":211,"term":"Yield","definition":"The income return on an investment, expressed as a percentage of the investment's cost or current market value. Yield types include current yield, yield to maturity, and distribution yield.","application":"A core infrastructure fund generates a 5% annual yield from contracted toll road revenues, making it attractive to pension funds seeking income to match their obligations.","topics":["Foundations of Alternative Investments","Real Assets","Portfolio Management"]},{"id":212,"term":"Total Return","definition":"The complete return on an investment, including price appreciation or depreciation plus any income (dividends, interest, or rent) generated over a period.","application":"A timberland fund generates a 12% total return: 4% from timber harvest income plus 8% from land value appreciation, making it competitive with PE on a risk-adjusted basis.","topics":["Foundations of Alternative Investments","Real Assets","Portfolio Management"]},{"id":213,"term":"Institutional Investor","definition":"An organization that invests large sums of capital on behalf of others, including pension funds, endowments, foundations, sovereign wealth funds, insurance companies, and family offices.","application":"Institutional investors dominate the limited partner base of private equity funds due to their size, long-term investment horizons, and ability to meet accredited/qualified investor requirements.","topics":["Foundations of Alternative Investments","Private Equity","Hedge Funds"]},{"id":214,"term":"Sovereign Wealth Fund (SWF)","definition":"A state-owned investment fund or entity that invests a country's reserves accumulated from natural resource revenues, trade surpluses, or central bank reserves in financial markets.","application":"The Abu Dhabi Investment Authority (ADIA) is one of the world's largest SWFs, allocating to global equities, private equity, real estate, and infrastructure to grow national wealth.","topics":["Foundations of Alternative Investments","Portfolio Management"]},{"id":215,"term":"Pension Fund","definition":"An investment fund established by an employer to provide retirement benefits to employees. Pension funds are among the largest investors in alternative assets due to long-term liabilities.","application":"A state pension fund with $50 billion in assets allocates 20% to private equity and 15% to real assets, seeking to match long-duration liabilities with higher-returning illiquid investments.","topics":["Foundations of Alternative Investments","Portfolio Management"]},{"id":216,"term":"Endowment","definition":"A fund of donated assets managed to provide a sustainable source of income for an institution (typically a university, foundation, or nonprofit) in perpetuity.","application":"Yale's endowment allocates over 70% to alternative investments (PE, VC, hedge funds, real assets), pioneering the endowment model and generating above-market returns over multiple decades.","topics":["Foundations of Alternative Investments","Portfolio Management"]},{"id":217,"term":"Family Office","definition":"A private wealth management firm established by ultra-high-net-worth families to manage their financial affairs, including investments, tax planning, estate planning, and philanthropy.","application":"A family office with $2 billion in assets allocates 30% to private equity co-investments, 20% to hedge funds, and 25% to real estate, alongside traditional asset classes.","topics":["Foundations of Alternative Investments","Portfolio Management"]},{"id":218,"term":"Fund Administration","definition":"Services provided by a third-party fund administrator, including NAV calculation, investor reporting, accounting, compliance support, and transfer agency functions for investment funds.","application":"A hedge fund outsources fund administration to a specialized firm that independently calculates monthly NAV, prepares investor statements, and ensures proper allocation of P&L across share classes.","topics":["Foundations of Alternative Investments","Hedge Funds"]},{"id":219,"term":"Custodian","definition":"A financial institution that holds and safeguards a fund's assets, including securities and cash, on behalf of investors. Separate from the fund manager to ensure asset protection.","application":"A hedge fund's assets are held by a prime broker and custodian bank, ensuring that investor assets are segregated from the fund manager's own assets and protected from manager insolvency.","topics":["Foundations of Alternative Investments","Hedge Funds"]},{"id":220,"term":"Auditor","definition":"An independent accounting firm that reviews and certifies a fund's financial statements, providing assurance to investors that the fund's reported NAV and financials are accurate and compliant.","application":"A PE fund's annual financial statements are audited by a Big Four accounting firm, providing LPs with independent verification of portfolio company valuations and the fund's NAV.","topics":["Foundations of Alternative Investments","Private Equity","Hedge Funds"]},{"id":221,"term":"Anti-Money Laundering (AML)","definition":"Regulations and procedures designed to prevent criminals from disguising illegally obtained funds as legitimate income through financial institutions and investment funds.","application":"A hedge fund's AML program requires all new investors to provide source-of-funds documentation, identity verification, and ongoing monitoring for suspicious transactions.","topics":["Foundations of Alternative Investments","Hedge Funds"]},{"id":222,"term":"Know Your Customer (KYC)","definition":"Regulatory compliance procedures used by financial institutions to verify the identity of their clients, assess their risk profiles, and ensure they are not involved in illegal activities.","application":"Before accepting capital, a PE fund requires all LPs to complete a KYC process, submitting identification documents, entity structures, and beneficial ownership information.","topics":["Foundations of Alternative Investments","Private Equity","Hedge Funds"]},{"id":223,"term":"ILPA (Institutional Limited Partners Association)","definition":"An organization representing limited partners in private equity and venture capital funds. ILPA promotes best practices, transparency, and LP-friendly terms in PE fund governance.","application":"ILPA principles advocate for fee transparency, consistent carried interest calculations, and standardized quarterly reports, which LPs use as a template for GP negotiations.","topics":["Private Equity","Foundations of Alternative Investments"]},{"id":224,"term":"AIFMD (Alternative Investment Fund Managers Directive)","definition":"A European Union regulatory framework governing alternative investment fund managers, imposing requirements on capital, governance, risk management, transparency, and investor protection.","application":"A hedge fund manager operating in Europe must comply with AIFMD requirements, including a minimum capital requirement, a depositary for fund assets, and annual reporting to regulators.","topics":["Foundations of Alternative Investments","Hedge Funds"]},{"id":225,"term":"FATCA (Foreign Account Tax Compliance Act)","definition":"U.S. legislation requiring foreign financial institutions to report information on financial accounts held by U.S. taxpayers to the IRS, or face withholding taxes.","application":"A Cayman Islands-domiciled hedge fund registers with the IRS under FATCA, requiring it to identify and report any U.S. investors to comply with U.S.
