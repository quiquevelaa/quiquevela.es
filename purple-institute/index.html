ce downturns and accelerate during price spikes — a natural real option that creates crisis resilience."},{"id":126,"type":"multiple_choice","difficulty":"expert","topic":"Portfolio Management","question":"Which of the following BEST explains why hedge fund alpha tends to decay over time after a strategy is widely discovered and replicated?","options":["Regulatory changes force hedge funds to stop using the strategy","As more capital chases the same anomaly, prices adjust, spreads compress, and the structural mispricing that created the return opportunity is arbitraged away","Hedge fund managers retire after discovering a good strategy","Markets become less efficient as more participants enter them"],"correct_answer":"As more capital chases the same anomaly, prices adjust, spreads compress, and the structural mispricing that created the return opportunity is arbitraged away","explanation":"This is the fundamental tension in quantitative and systematic investing: the act of exploiting an anomaly corrects it. As funds pile into the same trade, the price inefficiency disappears — alpha decays as it is harvested. New sources of alpha must constantly be sought."},{"id":127,"type":"true_false","difficulty":"expert","topic":"Venture Capital","question":"In a VC fund's power law return distribution, most of the fund's total return is typically generated by a very small number of investments, while the majority of portfolio companies return less than 1x.","correct_answer":true,"explanation":"VC returns follow a power law: the top 1–2 investments often return 10–100x and generate more than 100% of fund returns, while the majority of investments return 0–1x. This is why diversification across enough bets and access to outlier companies is critical in VC."},{"id":128,"type":"multiple_choice","difficulty":"expert","topic":"Commodities","question":"How does the 'EIA storage report' typically affect natural gas futures prices, and why does timing matter for commodity traders?","options":["The report is released annually and has minimal short-term price impact","The weekly EIA natural gas storage injection/withdrawal data is released every Thursday; surprises versus consensus expectations cause immediate futures price volatility, with larger-than-expected builds bearish and draws bullish","The EIA report only affects electricity futures, not natural gas","EIA reports are only relevant for crude oil markets, not natural gas"],"correct_answer":"The weekly EIA natural gas storage injection/withdrawal data is released every Thursday; surprises versus consensus expectations cause immediate futures price volatility, with larger-than-expected builds bearish and draws bullish","explanation":"Natural gas traders closely monitor weekly EIA storage data. A larger-than-expected injection (build) signals excess supply, pushing prices down. A larger-than-expected withdrawal (draw) signals tight supply, pushing prices up. The surprise vs. consensus expectation drives the immediate market reaction."},{"id":129,"type":"multiple_choice","difficulty":"expert","topic":"Risk Management","question":"Which statement about the Sharpe ratio is MOST accurate in the context of hedge funds with non-normal return distributions?","options":["The Sharpe ratio fully captures all relevant risk for hedge fund evaluation","The Sharpe ratio can be artificially inflated by strategies with negative skewness and high kurtosis (option selling, credit strategies) that appear low volatility until a tail event occurs","The Sharpe ratio penalizes funds for upside volatility, making it inappropriate for trending strategies","A Sharpe ratio above 2.0 is impossible to achieve without leverage"],"correct_answer":"The Sharpe ratio can be artificially inflated by strategies with negative skewness and high kurtosis (option selling, credit strategies) that appear low volatility until a tail event occurs","explanation":"Short volatility and credit strategies have low standard deviation (good Sharpe) during normal periods but suffer rare, catastrophic losses. Standard deviation doesn't capture this asymmetry. Strategies 'picking up nickels in front of a steamroller' look great on Sharpe until they don't."},{"id":130,"type":"sorting","difficulty":"expert","topic":"Foundations of Alternative Investments","question":"Rank these biases in alternative investment performance data from most to least likely to cause upward bias in reported historical returns:","items":["Survivorship Bias","Backfill (Instant History) Bias","Smoothed Pricing / Appraisal Lag","Selection Bias in LP Reporting"],"correct_order":["Backfill (Instant History) Bias","Survivorship Bias","Selection Bias in LP Reporting","Smoothed Pricing / Appraisal Lag"],"explanation":"Backfill bias selectively adds only good past records. Survivorship bias removes failed funds. Selection bias reflects only LPs willing to disclose returns (usually those with good performance). Smoothed pricing affects measured volatility more than the level of returns."},{"id":131,"type":"multiple_choice","difficulty":"first_steps","topic":"Venture Capital","question":"What is an 'accelerator' in the context of startups?","options":["A type of startup loan from a bank","A government grant for technology companies","A program that provides mentorship, resources, and seed funding to early-stage startups","A legal structure for startup companies"],"correct_answer":"A program that provides mentorship, resources, and seed funding to early-stage startups","explanation":"Accelerators like Y Combinator offer early-stage startups structured programs including mentorship, networking, seed capital, and a Demo Day to pitch investors in exchange for a small equity stake."},{"id":132,"type":"true_false","difficulty":"first_steps","topic":"Portfolio Management","question":"Rebalancing a portfolio means adjusting asset weights back toward target allocations after market movements cause drift.","correct_answer":true,"explanation":"Rebalancing restores the portfolio to its intended target allocation by selling assets that have grown above their target weight and buying those that have fallen below."},{"id":133,"type":"multiple_choice","difficulty":"first_steps","topic":"Risk Management","question":"Which of the following is an example of idiosyncratic (company-specific) risk?","options":["A global recession reducing all stock values","Rising interest rates affecting all bond prices","A pharmaceutical company's drug failing clinical trials","A currency devaluation in an emerging market"],"correct_answer":"A pharmaceutical company's drug failing clinical trials","explanation":"Idiosyncratic risk is specific to an individual company or asset. A drug trial failure affects only that company, not the entire market — unlike recessions or rate changes which affect all assets."},{"id":134,"type":"true_false","difficulty":"first_steps","topic":"Hedge Funds","question":"The 'high-water mark' protects investors by ensuring managers only earn performance fees on new profits above the previous peak NAV.","correct_answer":true,"explanation":"The high-water mark ensures that if a fund loses value and then recovers, the manager must first recoup all losses before earning performance fees again — preventing double-charging on recovery."},{"id":135,"type":"multiple_choice","difficulty":"first_steps","topic":"Real Assets","question":"Which type of real estate strategy involves purchasing and improving underperforming properties?","options":["Core","Value-Add","Passive","Fixed Income"],"correct_answer":"Value-Add","explanation":"Value-add real estate involves acquiring properties needing improvement — renovation, better management, or tenant repositioning — to increase their value and income potential."},{"id":136,"type":"true_false","difficulty":"basic","topic":"Commodities","question":"The spot price of a commodity is the price for immediate delivery, while the futures price is for delivery at a specified future date.","correct_answer":true,"explanation":"The spot price reflects current market value for immediate exchange. Futures prices reflect expected future value adjusted for carrying costs — the relationship between spot and futures defines whether a market is in contango or backwardation."},{"id":137,"type":"multiple_choice","difficulty":"basic","topic":"Hedge Funds","question":"What distinguishes a 'systematic' hedge fund strategy from a 'discretionary' one?","options":["Systematic strategies use higher leverage","Systematic strategies follow rules-based algorithmic models; discretionary strategies rely on manager judgment","Systematic strategies only trade equities","Discretionary strategies must be approved by a committee before each trade"],"correct_answer":"Systematic strategies follow rules-based algorithmic models; discretionary strategies rely on manager judgment","explanation":"Systematic strategies execute trades based on predetermined algorithmic rules with minimal human intervention. Discretionary managers manually evaluate situations using their judgment, experience, and research."},{"id":138,"type":"true_false","difficulty":"basic","topic":"Private Equity","question":"EBITDA is commonly used as a proxy for operating cash flow in private equity valuations.","correct_answer":true,"explanation":"EBITDA (Earnings Before Interest, Taxes, Depreciation, and Amortization) is widely used in PE as a valuation metric and operating performance proxy because it approximates cash generation before capital structure and accounting decisions."},{"id":139,"type":"multiple_choice","difficulty":"basic","topic":"Portfolio Management","question":"What is 'beta' in portfolio management?","options":["The excess return above a benchmark","A measure of an investment's volatility relative to the market","The correlation between two asset classes","The maximum allowable drawdown for a fund"],"correct_answer":"A measure of an investment's volatility relative to the market","explanation":"Beta measures sensitivity to market movements. Beta of 1.0 moves with the market; beta > 1.0 is more volatile than the market; beta < 1.0 is less volatile. It is the systematic risk component."},{"id":140,"type":"true_false","difficulty":"basic","topic":"Real Assets","question":"Gold is commonly used as an inflation hedge because its price tends to rise when inflation increases.","correct_answer":true,"explanation":"Gold is historically viewed as a store of value and inflation hedge — when fiat currencies depreciate or inflation rises, gold prices tend to increase, protecting purchasing power over long periods."},{"id":141,"type":"multiple_choice","difficulty":"pro","topic":"Foundations of Alternative Investments","question":"What is the key structural difference between a 3(c)(1) and a 3(c)(7) fund under the Investment Company Act?","options":["3(c)(1) funds invest in equities only; 3(c)(7) funds invest in alternatives","3(c)(1) funds are limited to 100 investors (accredited); 3(c)(7) funds allow unlimited investors but require qualified purchaser status","3(c)(7) funds must be publicly registered while 3(c)(1) funds are private","3(c)(1) funds can use leverage while 3(c)(7) funds cannot"],"correct_answer":"3(c)(1) funds are limited to 100 investors (accredited); 3(c)(7) funds allow unlimited investors but require qualified purchaser status","explanation":"3(c)(1) funds exempt from Investment Company Act registration are limited to 100 beneficial owners (accredited investors). 3(c)(7) funds can have unlimited investors but all must be qualified purchasers ($5M+ in investments) — a higher standard."},{"id":142,"type":"true_false","difficulty":"pro","topic":"Hedge Funds","question":"In a prime brokerage relationship, the prime broker may rehypothecate client assets — using them as collateral for its own borrowings — creating additional counterparty risk for the hedge fund.","correct_answer":true,"explanation":"Rehypothecation allows prime brokers to use client collateral for their own financing. If the prime broker fails (like Lehman Brothers), rehypothecated assets may be frozen or lost, creating severe losses for hedge funds."},{"id":143,"type":"multiple_choice","difficulty":"pro","topic":"Commodities","question":"A commodity trading advisor (CTA) uses a 50-day and 200-day moving average crossover to generate signals. What type of strategy is this?","options":["Fundamental analysis","Mean reversion","Trend-following / momentum","Statistical arbitrage"],"correct_answer":"Trend-following / momentum","explanation":"Moving average crossovers are a classic trend-following signal — a 50-day MA crossing above the 200-day MA generates a buy signal (golden cross), indicating positive momentum. CTAs use such signals across hundreds of global futures markets."},{"id":144,"type":"true_false","difficulty":"pro","topic":"Portfolio Management","question":"The information ratio measures a manager's ability to generate consistent alpha relative to their active risk (tracking error).","correct_answer":true,"explanation":"Information Ratio = (Portfolio Return - Benchmark Return) / Tracking Error. It measures how much alpha is generated per unit of active risk, rewarding consistency of alpha generation rather than just raw outperformance."},{"id":145,"type":"multiple_choice","difficulty":"pro","topic":"Venture Capital","question":"What is the purpose of a drag-along right in a VC-backed company?","options":["To allow founders to drag their vesting schedule forward","To enable majority shareholders to force minority shareholders to join in a sale at the same terms","To require investors to follow on in all future funding rounds","To allow management to drag out a sale process to negotiate better terms"],"correct_answer":"To enable majority shareholders to force minority shareholders to join in a sale at the same terms","explanation":"Drag-along rights prevent minority shareholders from blocking an acquisition that the majority (usually VC investors) has agreed to. This is essential for enabling clean M&A exits without a small shareholder holdout."},{"id":146,"type":"multiple_choice","difficulty":"expert","topic":"Hedge Funds","question":"A global macro fund takes large positions in interest rate derivatives using leverage of 20x notional. Which scenario poses the GREATEST systemic risk to financial markets?","options":["The fund's positions lose 5% of their value","The fund's prime broker demands variation margin and the fund is forced to rapidly unwind large leveraged positions, causing a liquidity crisis in the rates market","The fund's investment thesis is correct and it earns outsized returns","The fund's LP base requests full redemption over 12 months"],"correct_answer":"The fund's prime broker demands variation margin and the fund is forced to rapidly unwind large leveraged positions, causing a liquidity crisis in the rates market","explanation":"Forced deleveraging of large, leveraged positions is a key transmission mechanism for systemic risk. LTCM (1998) demonstrated this: its massive leveraged bond positions required Fed-orchestrated rescue when markets moved against it, threatening global financial stability."},{"id":147,"type":"true_false","difficulty":"expert","topic":"Private Equity","question":"In a typical 'continuation fund' transaction, the GP has an inherent conflict of interest because it is simultaneously the seller (from the old fund) and the buyer (for the new fund) of the same assets.","correct_answer":true,"explanation":"GP-led secondary conflicts are well documented: the GP sets the asset valuation, chooses which assets to roll over, and benefits from extending management fees. Institutional LPs and independent advisors are increasingly involved to manage this conflict."},{"id":148,"type":"multiple_choice","difficulty":"expert","topic":"Portfolio Management","question":"An investor uses Black-Litterman optimization instead of standard MVO. What is the primary advantage?","options":["Black-Litterman always generates higher Sharpe ratios than MVO","Black-Litterman combines market equilibrium returns with explicit investor views, reducing the sensitivity to input assumptions that causes MVO to produce extreme allocations","Black-Litterman eliminates the need to estimate correlations between assets","Black-Litterman is specifically designed for private equity portfolios"],"correct_answer":"Black-Litterman combines market equilibrium returns with explicit investor views, reducing the sensitivity to input assumptions that causes MVO to produce extreme allocations","explanation":"Black-Litterman starts with market-implied (CAPM) expected returns as a prior, then blends the investor's views with varying levels of confidence. This prevents the extreme, unstable allocations that result from MVO's hypersensitivity to return estimates."},{"id":149,"type":"true_false","difficulty":"expert","topic":"Commodities","question":"A commodity futures curve can be simultaneously in contango for near-term contracts and in backwardation for longer-dated contracts.","correct_answer":true,"explanation":"Futures curves can have complex shapes with contango in the front of the curve and backwardation further out (or vice versa). This reflects varying supply/demand, storage costs, and convenience yield across different delivery periods."},{"id":150,"type":"multiple_choice","difficulty":"expert","topic":"Risk Management","question":"Why does a portfolio's realized volatility often overstate true economic risk during periods when markets are pricing in future stress?","options":["Historical volatility is always lower than implied volatility","During market stress, bid-ask spreads widen and prices become stale, so reported price changes understate true economic moves until the next mark-to-market","Realized volatility calculations exclude outlier observations by convention","Portfolio managers deliberately smooth returns during stress periods"],"correct_answer":"During market stress, bid-ask spreads widen and prices become stale, so reported price changes understate true economic moves until the next mark-to-market","explanation":"This is the flip side of illiquid asset smoothing: in stressed markets, last-traded prices may be stale and wide bid-ask spreads mean the true liquidation value is unknown. Early in a crisis, reported volatility can UNDERSTATE economic risk before prices adjust to reflect true impairment."},{"id":151,"type":"multiple_choice","difficulty":"first_steps","topic":"Hedge Funds","question":"What is the primary goal of a market-neutral hedge fund strategy?","options":["To maximize returns by taking large directional bets on the market","To generate returns from stock selection with minimal overall market exposure","To invest only in defensive sectors during market downturns","To hold equal amounts of all stocks in the market index"],"correct_answer":"To generate returns from stock selection with minimal overall market exposure","explanation":"Market-neutral strategies offset long and short positions to eliminate beta exposure, seeking to profit purely from the relative performance between chosen stocks rather than from overall market direction."},{"id":152,"type":"true_false","difficulty":"first_steps","topic":"Private Equity","question":"Private equity funds typically have a defined lifespan of 10 years.","correct_answer":true,"explanation":"Most private equity funds are structured as closed-end funds with a standard 10-year life — typically 5 years for investment and 5 years for harvesting and returning capital to LPs."},{"id":153,"type":"multiple_choice","difficulty":"first_steps","topic":"Commodities","question":"Which of the following is a PRIMARY use case for commodity futures contracts?","options":["Long-term equity investment","Hedging price risk for producers and consumers of commodities","Replacing physical ownership of commodities","Generating dividend income"],"correct_answer":"Hedging price risk for producers and consumers of commodities","explanation":"Futures contracts were originally designed to allow commodity producers (e.g., farmers, miners) and consumers (e.g., manufacturers, airlines) to lock in prices and manage the risk of future price movements."},{"id":154,"type":"true_false","difficulty":"basic","topic":"Portfolio Management","question":"A portfolio with a Sortino ratio of 1.5 has better risk-adjusted returns relative to downside risk than a portfolio with a Sortino ratio of 0.8.","correct_answer":true,"explanation":"The Sortino ratio measures return relative to downside risk only. A higher Sortino ratio means the portfolio generates more return per unit of downside deviation — indicating better downside risk-adjusted performance."},{"id":155,"type":"multiple_choice","difficulty":"basic","topic":"Real Assets","question":"What does NOI (Net Operating Income) represent in real estate?","options":["Gross rental income minus financing costs","Gross revenue minus all operating expenses, before debt service","Property appreciation minus cost of improvements","Net income after taxes for a real estate company"],"correct_answer":"Gross revenue minus all operating expenses, before debt service","explanation":"NOI = Gross Revenue - Operating Expenses (excluding mortgage payments and taxes). It measures the property's income-generating ability independent of financing structure, used to calculate cap rates and valuations."},{"id":156,"type":"true_false","difficulty":"pro","topic":"Risk Management","question":"Stress testing and scenario analysis are complementary risk management tools — stress tests examine portfolio sensitivities to factor shocks, while scenario analysis models the impact of specific historical or hypothetical events.","correct_answer":true,"explanation":"Stress testing measures how much portfolio value changes when specific risk factors (rates, FX, equity) move by defined amounts. Scenario analysis applies a complete, consistent set of market moves representing a specific event (e.g., 2008 crisis), providing a more integrated view."},{"id":157,"type":"multiple_choice","difficulty":"pro","topic":"Foundations of Alternative Investments","question":"Which document establishes the legal structure, investment mandate, fee terms, and GP/LP rights for a private equity fund?","options":["Subscription Agreement","Side Letter","Limited Partnership Agreement (LPA)","Private Placement Memorandum (PPM)"],"correct_answer":"Limited Partnership Agreement (LPA)","explanation":"The LPA is the governing legal document of the fund, defining investment strategy, fee structure, waterfall, GP/LP rights and obligations, reporting requirements, and governance mechanisms."},{"id":158,"type":"true_false","difficulty":"pro","topic":"Commodities","question":"An oil producer that sells crude oil futures to lock in future prices is engaging in hedging, not speculation.","correct_answer":true,"explanation":"Commodity producers use futures to hedge price risk — locking in known future revenues to reduce financial uncertainty. This is the opposite of speculation, which involves taking risk to profit from price movements."},{"id":159,"type":"multiple_choice","difficulty":"expert","topic":"Portfolio Management","question":"A pension fund with $10B AUM has a liability-driven investment (LDI) strategy. Interest rates fall 200bps. What happens to the pension's funded status if its asset and liability durations are NOT matched?","options":["Funded status improves because asset values rise","Funded status deteriorates if liability duration is longer than asset duration, because the present value of liabilities increases more than asset values","Funded status is unaffected as rate changes are symmetric","The LDI strategy automatically hedges all interest rate moves"],"correct_answer":"Funded status deteriorates if liability duration is longer than asset duration, because the present value of liabilities increases more than asset values","explanation":"LDI directly addresses duration mismatch. If pension liabilities (typically 15–25 year duration) aren't matched by assets, a rate decline inflates the PV of liabilities more than asset gains — reducing the funding ratio even if assets rise. This is why pension funds use long-duration bonds and interest rate swaps."},{"id":160,"type":"multiple_choice","difficulty":"expert","topic":"Venture Capital","question":"A SPAC (Special Purpose Acquisition Company) merger gives a VC-backed startup several advantages over a traditional IPO. Which is MOST important from the VC's perspective?","options":["Lower SEC filing fees compared to a traditional IPO","The SPAC lock-up period is typically shorter than post-IPO lock-ups","SPACs allow the company to make forward-looking financial projections in marketing materials that are prohibited in traditional IPO roadshows","SPAC mergers always result in higher valuations than traditional IPOs"],"correct_answer":"SPACs allow the company to make forward-looking financial projections in marketing materials that are prohibited in traditional IPO roadshows","explanation":"The key regulatory advantage of SPAC mergers is the ability to present detailed financial projections and forecasts (protected as private company communications) that are prohibited in traditional S-1 IPO registrations. This is especially valuable for high-growth pre-revenue companies whose value is in future potential."},{"id":161,"type":"multiple_choice","difficulty":"first_steps","topic":"Foundations of Alternative Investments","question":"What is a 'capital call' in private equity?","options":["The total amount raised by a PE fund from investors","A request by the GP for investors to contribute their committed capital","A signal from the market to invest in PE","The annual return generated by a PE fund"],"correct_answer":"A request by the GP for investors to contribute their committed capital","explanation":"Capital calls (or 'drawdowns') are formal notices sent to LPs requesting they transfer committed capital to fund specific investments or operational costs of the PE fund."},{"id":162,"type":"true_false","difficulty":"first_steps","topic":"Venture Capital","question":"A startup's 'runway' refers to how long it can operate before running out of money.","correct_answer":true,"explanation":"Runway = Cash on Hand / Monthly Burn Rate. It represents the number of months a startup can continue operations without raising additional capital or achieving profitability."},{"id":163,"type":"multiple_choice","difficulty":"basic","topic":"Private Equity","question":"What is the primary difference between a growth equity investment and a buyout?","options":["Growth equity uses more leverage than buyouts","Growth equity takes minority stakes in established companies; buyouts acquire controlling interests often with significant debt","Growth equity only invests in tech companies","Buyouts target early-stage companies while growth equity targets mature companies"],"correct_answer":"Growth equity takes minority stakes in established companies; buyouts acquire controlling interests often with significant debt","explanation":"Growth equity provides expansion capital for established profitable companies with minority ownership and little or no debt. Buyouts acquire controlling stakes (often majority) using significant leverage."},{"id":164,"type":"true_false","difficulty":"basic","topic":"Risk Management","question":"An investment with a high Sharpe ratio always represents a better investment than one with a low Sharpe ratio.","correct_answer":false,"explanation":"The Sharpe ratio uses standard deviation (both upside and downside volatility). Strategies with negative skewness (frequent small gains, rare catastrophic losses) can have misleadingly high Sharpe ratios that mask tail risks. Context matters."},{"id":165,"type":"sorting","difficulty":"pro","topic":"Private Equity","question":"Arrange these private equity exit routes in order of typical deal complexity from simplest to most complex:","items":["Secondary Sale to Another PE Firm","Strategic Sale to a Corporate Acquirer","Initial Public Offering (IPO)","Dividend Recapitalization"],"correct_order":["Dividend Recapitalization","Secondary Sale to Another PE Firm","Strategic Sale to a Corporate Acquirer","Initial Public Offering (IPO)"],"explanation":"Dividend recaps are the simplest (no ownership change). Secondary PE sales require LP/GP negotiation but no public process. Strategic sales involve negotiations and regulatory approval. IPOs are the most complex with SEC registration, roadshows, underwriters, and lock-up periods."},{"id":166,"type":"multiple_choice","difficulty":"pro","topic":"Real Assets","question":"What distinguishes a 'core' infrastructure investment from a 'core-plus' infrastructure investment?","options":["Core infrastructure is in the core of major cities; core-plus is in suburban areas","Core assets have purely regulated or contracted revenues with no demand risk; core-plus includes some demand or volume risk in exchange for marginally higher returns","Core-plus infrastructure uses more leverage than core infrastructure","Core infrastructure only includes transportation assets"],"correct_answer":"Core assets have purely regulated or contracted revenues with no demand risk; core-plus includes some demand or volume risk in exchange for marginally higher returns","explanation":"Core infrastructure (water utilities, regulated electricity networks) has near-certain revenues. Core-plus adds some demand sensitivity (e.g., toll roads with volume risk) for a small return premium, while still being lower risk than opportunistic infrastructure (greenfield development)."},{"id":167,"type":"true_false","difficulty":"expert","topic":"Hedge Funds","question":"A hedge fund manager with a strong track record who closes the fund to new investors is likely trying to preserve alpha capacity — since larger funds face diminishing returns as they cannot size positions without moving markets.","correct_answer":true,"explanation":"Capacity constraints are real in alpha-generating strategies. A $500M fund can take a 5% position in a mid-cap stock; a $10B fund cannot do this without moving the price. Managers who close to new capital are prioritizing existing LP returns over fee income growth."},{"id":168,"type":"multiple_choice","difficulty":"expert","topic":"Risk Management","question":"A hedge fund has a gross exposure of 400% (200% long, 200% short). Its net equity beta is 0.1. Which statement BEST characterizes this fund's risk profile?","options":["The fund has minimal risk because it is almost market neutral","The fund has significant risk from idiosyncratic, sector, factor, and liquidity risks despite low market beta — the high gross exposure means any mismatch in long/short book performance is amplified","The fund is likely a passive index fund with minimal active risk","High gross exposure with low net exposure is impossible to achieve"],"correct_answer":"The fund has significant risk from idiosyncratic, sector, factor, and liquidity risks despite low market beta — the high gross exposure means any mismatch in long/short book performance is amplified","explanation":"Low net beta doesn't mean low risk. With 400% gross exposure, even a small performance divergence between the long and short books creates large P&L swings. Factor, sector, liquidity, and short squeeze risks are all amplified at high gross leverage — as seen in the 2007 quant deleveraging."},{"id":169,"type":"true_false","difficulty":"expert","topic":"Foundations of Alternative Investments","question":"The AIFMD's depositary requirement ensures that hedge fund assets are held by an independent third party and cannot be rehypothecated by the manager, providing full investor protection.","correct_answer":false,"explanation":"AIFMD's depositary requirement provides significant protection but does not prevent ALL rehypothecation. Prime brokers can still rehypothecate assets under certain conditions, and the depositary oversight is focused on oversight and safekeeping rather than absolute prevention of rehypothecation arrangements."},{"id":170,"type":"multiple_choice","difficulty":"expert","topic":"Commodities","question":"An oil & gas company has $500M in floating-price crude oil production and enters a 3-year fixed-price swap at $75/barrel. Six months later, oil prices rise to $100/barrel. What is the financial consequence?","options":["The company benefits fully from $100 oil pricing on its revenues","The company continues to receive $75/barrel under the swap, missing the $25/barrel upside — the hedge has an opportunity cost but protected against downside","The company can break the swap at no cost since market prices have moved favorably","The swap automatically resets to the new market price of $100"],"correct_answer":"The company continues to receive $75/barrel under the swap, missing the $25/barrel upside — the hedge has an opportunity cost but protected against downside","explanation":"This illustrates the opportunity cost of hedging. The fixed-price swap locks in $75/barrel regardless of market moves. When oil rises to $100, the hedged company 'loses' $25/barrel in opportunity versus unhedged competitors — but would have been protected if prices had fallen to $50."},{"id":171,"type":"multiple_choice","difficulty":"first_steps","topic":"Portfolio Management","question":"What does 'diversification' mean in investing?","options":["Concentrating all investments in the best-performing asset","Spreading investments across different assets to reduce risk","Investing in foreign markets exclusively","Using leverage to increase potential returns"],"correct_answer":"Spreading investments across different assets to reduce risk","explanation":"Diversification reduces risk by spreading investments across different assets that don't move together. When one investment loses value, others may hold steady or gain, reducing overall portfolio volatility."},{"id":172,"type":"true_false","difficulty":"first_steps","topic":"Private Equity","question":"In private equity, 'dry powder' refers to capital that has been invested in portfolio companies.","correct_answer":false,"explanation":"Dry powder refers to uncommitted or undeployed capital — funds raised from LPs but not yet invested in companies. It represents the PE industry's available firepower for new investments."},{"id":173,"type":"multiple_choice","difficulty":"basic","topic":"Hedge Funds","question":"What is a 'redemption gate' in a hedge fund?","options":["A minimum investment threshold for new investors","A limit on the percentage of fund assets that can be withdrawn in a given period","A fee charged for early redemption of shares","The maximum number of investors allowed in the fund"],"correct_answer":"A limit on the percentage of fund assets that can be withdrawn in a given period","explanation":"Redemption gates protect hedge funds from forced liquidation of illiquid positions during mass withdrawals. For example, a 25% quarterly gate limits total redemptions to 25% of NAV per quarter."},{"id":174,"type":"true_false","difficulty":"basic","topic":"Real Assets","question":"Farmland investment can provide both rental income from leasing to farmers and capital appreciation from rising land values.","correct_answer":true,"explanation":"Farmland returns come from two sources: operating income (rental income from tenant farmers or crop sale proceeds) and land value appreciation over time, driven by population growth, water access, and agricultural commodity prices."},{"id":175,"type":"sorting","difficulty":"pro","topic":"Hedge Funds","question":"Arrange these hedge fund fee structures from most to least favorable to the investor:","items":["1% management fee, 10% carry, with HWM","2% management fee, 20% carry, no HWM","1.5% management fee, 15% carry, with HWM and hurdle rate","2% management fee, 20% carry, with HWM and hurdle rate"],"correct_order":["1% management fee, 10% carry, with HWM","1.5% management fee, 15% carry, with HWM and hurdle rate","2% management fee, 20% carry, with HWM and hurdle rate","2% management fee, 20% carry, no HWM"],"explanation":"Lower fees + HWM + hurdle rate = most investor-friendly. No HWM is worst as managers earn carry even on recovered losses. A hurdle rate ensures managers only earn carry on returns above a threshold."},{"id":176,"type":"multiple_choice","difficulty":"pro","topic":"Risk Management","question":"What does a negative skewness of -1.5 in a hedge fund's return distribution imply for risk management?","options":["The fund has more frequent positive returns than negative ones","The fund has a heavy left tail — extreme losses are more likely and more severe than would be expected under a normal distribution","The fund's returns are highly correlated with equity markets","The fund underperforms in trending markets"],"correct_answer":"The fund has a heavy left tail — extreme losses are more likely and more severe than would be expected under a normal distribution","explanation":"Negative skewness means the distribution is skewed to the left. Combined with excess kurtosis, this implies 'tail risk' — infrequent but severe drawdowns. Options-selling and credit strategies often exhibit this profile."},{"id":177,"type":"true_false","difficulty":"pro","topic":"Venture Capital","question":"The option pool shuffle in a VC term sheet effectively dilutes founders before new investors come in, making the post-money valuation appear better for the VC than it actually is.","correct_answer":true,"explanation":"The option pool is typically created from EXISTING shares (pre-money), diluting founders and existing investors before the VC counts their ownership percentage. This means the VC's effective price per share is lower than the headline valuation implies."},{"id":178,"type":"multiple_choice","difficulty":"expert","topic":"Private Equity","question":"In assessing a PE fund's true performance, what is the MAIN advantage of the PME+ methodology over standard PME?","options":["PME+ adjusts for management fees while standard PME does not","PME+ adjusts the scaling factor so that the present value of fund distributions equals the present value of capital calls invested in the index, removing the distortion from funds with very different scale","PME+ uses geometric rather than arithmetic returns","PME+ accounts for currency risk in international funds"],"correct_answer":"PME+ adjusts the scaling factor so that the present value of fund distributions equals the present value of capital calls invested in the index, removing the distortion from funds with very different scale","explanation":"Standard PME can produce distorted results when a fund has many distributions early (making PME look low) or late (making PME look high). PME+ solves this by scaling the public market investment to match the fund's terminal NAV, providing a cleaner apples-to-apples comparison."},{"id":179,"type":"multiple_choice","difficulty":"expert","topic":"Real Assets","question":"What is the primary reason pension funds prefer direct infrastructure investment over infrastructure funds-of-funds, despite the complexity?","options":["Direct investments have shorter lock-up periods","Direct investments eliminate the double layer of fees (FoF fees on top of fund fees), allow customization of risk/return profile, and provide greater transparency and control over specific assets","Infrastructure FoFs are not permitted to invest in regulated utilities","Direct investments allow pension funds to use more leverage"],"correct_answer":"Direct investments eliminate the double layer of fees (FoF fees on top of fund fees), allow customization of risk/return profile, and provide greater transparency and control over specific assets","explanation":"Large pension funds (e.g., CPPIB, APG, OTPP) increasingly co-invest and invest directly in infrastructure to reduce the fee burden (FoF adds 0.5–1% to an already 1–1.5% layer), gain direct asset control, and tailor exposures to match specific liability profiles."},{"id":180,"type":"true_false","difficulty":"expert","topic":"Portfolio Management","question":"An investor who applies factor investing can generate superior risk-adjusted returns in the long run, even without any stock selection skill, simply by systematically harvesting well-documented factor premia.","correct_answer":true,"explanation":"Value, momentum, quality, and low volatility factors have robust evidence across multiple asset classes and time periods. Systematic factor strategies can generate excess returns over cap-weighted benchmarks without alpha from individual security selection — representing compensation for different types of risk."},{"id":181,"type":"multiple_choice","difficulty":"first_steps","topic":"Hedge Funds","question":"What does 'absolute return' mean for a hedge fund?","options":["Returns that are always positive","Returns measured against a benchmark index","Positive returns regardless of market direction","Returns after deducting all fees"],"correct_answer":"Positive returns regardless of market direction","explanation":"Hedge funds targeting absolute returns aim to generate positive performance in both bull and bear markets, unlike traditional funds benchmarked to an index."},{"id":182,"type":"true_false","difficulty":"basic","topic":"Foundations of Alternative Investments","question":"The management fee in a PE fund is designed to compensate the GP for generating investment returns.","correct_answer":false,"explanation":"The management fee covers the GP's operating expenses — salaries, rent, legal, travel. It is NOT a performance fee. Carried interest is the GP's reward for generating investment returns."},{"id":183,"type":"multiple_choice","difficulty":"basic","topic":"Venture Capital","question":"What is ARR in the context of a SaaS startup?","options":["Average Revenue Ratio","Annual Recurring Revenue","Adjusted Return on Revenue","Asset Recovery Rate"],"correct_answer":"Annual Recurring Revenue","explanation":"ARR (Annual Recurring Revenue) is the annualized value of subscription revenue from active customers. It is the primary top-line metric for SaaS companies and drives VC valuation multiples."},{"id":184,"type":"sorting","difficulty":"expert","topic":"Risk Management","question":"Rank these events from most to least likely to be classified as 'systemic risk' events for financial markets:","items":["A single hedge fund losing 20% of its NAV","A major investment bank becoming insolvent","An emerging market sovereign default","Global money market fund breaking the buck and triggering widespread redemptions"],"correct_order":["Global money market fund breaking the buck and triggering widespread redemptions","A major investment bank becoming insolvent","An emerging market sovereign default","A single hedge fund losing 20% of its NAV"],"explanation":"MMF breaking the buck (as Reserve Fund did in 2008) triggers mass redemptions and credit market freezes — maximum systemic impact. Bank insolvency (Lehman) cascades through counterparty chains. EM sovereign defaults cause regional contagion. A single fund loss is idiosyncratic and isolated."},{"id":185,"type":"multiple_choice","difficulty":"pro","topic":"Private Equity","question":"What is the purpose of an EBITDA 'add-back' in private equity due diligence?","options":["To increase management fees for the GP","To adjust reported EBITDA for one-time, non-recurring items to show the true normalized earnings power of the business","To add projected future earnings to current EBITDA","To calculate the tax shield from interest deductions on LBO debt"],"correct_answer":"To adjust reported EBITDA for one-time, non-recurring items to show the true normalized earnings power of the business","explanation":"EBITDA add-backs adjust for non-recurring costs (legal settlements, restructuring charges) to show normalized profitability. They are used to justify higher valuations — but can be aggressively applied, making credit analysis of adjusted EBITDA critically important."},{"id":186,"type":"true_false","difficulty":"pro","topic":"Portfolio Management","question":"Adding a low-correlation asset to a portfolio can improve the Sharpe ratio even if the new asset's standalone Sharpe ratio is lower than the portfolio's existing Sharpe ratio.","correct_answer":true,"explanation":"This is the fundamental insight of MPT. A low-Sharpe-ratio asset with near-zero correlation to the portfolio reduces overall portfolio volatility more than it reduces returns, improving the blended Sharpe ratio — illustrating that correlation matters as much as individual return/risk."},{"id":187,"type":"multiple_choice","difficulty":"expert","topic":"Hedge Funds","question":"An event-driven hedge fund holds a large merger arbitrage position when the deal is unexpectedly blocked by antitrust regulators. The target stock falls 30% immediately. This is an example of which type of risk?","options":["Basis risk","Gap risk — the deal fails and the stock price discontinuously jumps to pre-announcement levels, bypassing any ability to hedge or exit gradually","Duration risk","Liquidity risk from wide bid-ask spreads"],"correct_answer":"Gap risk — the deal fails and the stock price discontinuously jumps to pre-announcement levels, bypassing any ability to hedge or exit gradually","explanation":"Merger arbitrage faces binary gap risk: deals either close (small gain = capture the spread) or break (large loss = stock returns to pre-deal price or lower). The gap is discontinuous and cannot be hedged with gradual stop-losses — the position value gaps down instantaneously on deal failure."},{"id":188,"type":"true_false","difficulty":"expert","topic":"Real Assets","question":"Carbon credits qualify as a commodity asset class and can be traded in futures markets, making them potentially suitable for allocation in a commodity-focused investment portfolio.","correct_answer":true,"explanation":"Carbon emission allowances (EUAs in Europe, CCA in California) trade as standardized contracts with futures listed on regulated exchanges. They exhibit commodity characteristics (supply/demand drivers, volatility) and are increasingly integrated into commodity index and hedge fund portfolios."},{"id":189,"type":"multiple_choice","difficulty":"expert","topic":"Venture Capital","question":"What does a 'down-round ratchet' mechanism mean for existing VC investors with full ratchet anti-dilution protection?","options":["The investor's share count is reduced proportionally in the down round","The investor's conversion price is reset to the new lower price per share, effectively issuing them additional shares at no cost — significantly diluting founders and non-protected shareholders","The investor must make an additional capital contribution to maintain their ownership percentage","The ratchet automatically converts preferred shares to common shares"],"correct_answer":"The investor's conversion price is reset to the new lower price per share, effectively issuing them additional shares at no cost — significantly diluting founders and non-protected shareholders","explanation":"Full ratchet anti-dilution protection is extremely punitive: the conversion price resets to match the down round price entirely, regardless of volume. A $10M investment at $10/share resets to $1/share in a down round at $1/share — the investor now owns 10x more shares, massively diluting everyone else."},{"id":190,"type":"multiple_choice","difficulty":"first_steps","topic":"Risk Management","question":"What is 'leverage' in investing?","options":["The process of selling assets to raise cash","Using borrowed money to amplify potential investment returns","Diversifying across multiple asset classes","Rebalancing a portfolio quarterly"],"correct_answer":"Using borrowed money to amplify potential investment returns","explanation":"Leverage involves borrowing to increase the size of an investment beyond what equity alone would allow. While it magnifies potential gains, it equally amplifies losses."},{"id":191,"type":"true_false","difficulty":"first_steps","topic":"Commodities","question":"Crude oil is classified as a hard commodity.","correct_answer":true,"explanation":"Hard commodities are natural resources that must be extracted or mined. Crude oil, natural gas, gold, copper, and coal are all hard commodities. Agricultural products like wheat and corn are soft commodities."},{"id":192,"type":"multiple_choice","difficulty":"basic","topic":"Private Equity","question":"What does 'EBITDA multiple expansion' mean as a return driver in private equity?","options":["Growing a company's EBITDA through operational improvements","Selling a company at a higher valuation multiple than it was purchased at","Using more leverage to increase equity returns","Expanding operations into new geographic markets"],"correct_answer":"Selling a company at a higher valuation multiple than it was purchased at","explanation":"Multiple expansion occurs when the EV/EBITDA multiple at exit is higher than at entry. For example, buying at 8x and selling at 12x EBITDA generates returns purely from re-rating, independent of earnings growth."},{"id":193,"type":"true_false","difficulty":"basic","topic":"Hedge Funds","question":"Event-driven hedge fund strategies profit from pricing inefficiencies that arise around corporate events like mergers, bankruptcies, and spin-offs.","correct_answer":true,"explanation":"Event-driven strategies (merger arb, distressed, special situations) seek to exploit mispricings that occur when corporate events create information asymmetry or forced selling — generating returns from the event outcome rather than market direction."},{"id":194,"type":"multiple_choice","difficulty":"basic","topic":"Portfolio Management","question":"What is the 'risk-free rate' used for in portfolio performance analysis?","options":["To calculate the maximum allowable loss in a portfolio","As a baseline return against which portfolio risk-adjusted performance is measured","To determine the minimum fund size required for hedge fund strategies","As a target return for conservative pension fund allocations"],"correct_answer":"As a baseline return against which portfolio risk-adjusted performance is measured","explanation":"The risk-free rate (typically the 3-month T-bill yield) represents the minimum return available without taking any risk. It is used as the baseline in Sharpe ratios, alpha calculations, and required return frameworks."},{"id":195,"type":"sorting","difficulty":"basic","topic":"Venture Capital","question":"Rank these company stages from earliest (most risk) to latest (least risk) for venture capital investment:","items":["Late-Stage Pre-IPO","Series A","Seed","Series B"],"correct_order":["Seed","Series A","Series B","Late-Stage Pre-IPO"],"explanation":"Risk decreases as companies mature and demonstrate product-market fit, revenue growth, and operational scale. Seed companies are pre-revenue with high failure rates; late-stage companies have established business models and are approaching liquidity events."},{"id":196,"type":"true_false","difficulty":"pro","topic":"Real Assets","question":"Greenfield infrastructure investments typically target higher IRRs than brownfield investments to compensate for construction, permitting, and ramp-up risks.","correct_answer":true,"explanation":"Greenfield projects carry development risks absent in operational brownfield assets: construction cost overruns, permitting delays, and revenue ramp-up uncertainty. Investors demand 300–500bps additional IRR above brownfield levels as compensation."},{"id":197,"type":"multiple_choice","difficulty":"pro","topic":"Hedge Funds","question":"Which statement BEST describes the role of a 'prime broker' for a hedge fund?","options":["A broker who exclusively executes the fund's largest trades","A financial institution providing securities lending, margin financing, trade clearing, and operational support — serving as the operational backbone for the hedge fund","An independent auditor verifying the hedge fund's NAV","A placement agent marketing the fund to new investors"],"correct_answer":"A financial institution providing securities lending, margin financing, trade clearing, and operational support — serving as the operational backbone for the hedge fund","explanation":"Prime brokers provide the complete operational infrastructure for hedge funds: borrowing securities for short sales, extending leverage via margin loans, executing and clearing trades, providing portfolio reporting, and introducing investors — all bundled into a single service relationship."},{"id":198,"type":"true_false","difficulty":"pro","topic":"Private Equity","question":"The ILPA Principles are legally binding standards that all PE GPs must follow when structuring their funds.","correct_answer":false,"explanation":"ILPA Principles are voluntary best practice guidelines promoted by the LP community for fee transparency, governance, and reporting standards. They are NOT legally binding but carry significant market influence as large institutional LPs reference them in GP negotiations."},{"id":199,"type":"multiple_choice","difficulty":"expert","topic":"Portfolio Management","question":"A sovereign wealth fund is experiencing the 'denominator effect' during a market rally. Which action BEST addresses this without creating excessive illiquidity concentration?","options":["Immediately commit maximum capital to all available PE funds","Increase tactical allocation to liquid alternatives that replicate PE return patterns while building a long-term commitment pacing model to sustainably grow the illiquid allocation","Suspend all new PE commitments until market values normalize","Sell existing PE interests in the secondary market at a premium"],"correct_answer":"Increase tactical allocation to liquid alternatives that replicate PE return patterns while building a long-term commitment pacing model to sustainably grow the illiquid allocation","explanation":"The denominator effect creates pressure to over-commit to illiquids at a market peak. The sophisticated response is to use liquid alternatives as a 'bridge' allocation while developing a disciplined pacing model that increases PE commitments over multiple vintages — avoiding both under-allocation and overcommitment."},{"id":200,"type":"true_false","difficulty":"expert","topic":"Commodities","question":"The 'theory of storage' explains the relationship between commodity spot prices, futures prices, and cost of carry — predicting that convenience yield will be highest when inventory levels are lowest.","correct_answer":true,"explanation":"The theory of storage (Working, Kaldor) shows that when inventories are scarce, the marginal value of holding physical stock (convenience yield) is very high — creating backwardation. When stocks are ample, convenience yield is low and the cost of carry dominates — creating contango."},{"id":201,"type":"multiple_choice","difficulty":"first_steps","topic":"Venture Capital","question":"What does 'product-market fit' mean for a startup?","options":["A startup's product meets all regulatory requirements","A product that strongly satisfies the needs of a specific market","When a product is available in all markets globally","The financial fit between product pricing and target customer income"],"correct_answer":"A product that strongly satisfies the needs of a specific market","explanation":"Product-market fit means a startup's product effectively solves a real problem for a target customer segment, evidenced by strong retention, word-of-mouth growth, and customers who would be disappointed if the product disappeared."},{"id":202,"type":"true_false","difficulty":"first_steps","topic":"Hedge Funds","question":"A long/short equity hedge fund can profit from both rising and falling stock prices.","correct_answer":true,"explanation":"Long positions profit when stocks rise; short positions profit when stocks fall. By holding both, a long/short fund can generate returns from stock selection in both bull and bear markets."},{"id":203,"type":"multiple_choice","difficulty":"basic","topic":"Risk Management","question":"What is 'counterparty risk'?","options":["The risk that a portfolio manager makes poor investment decisions","The risk that the other party in a financial transaction will default on their obligations","The risk of investing in a single country","The risk that a commodity price moves against your position"],"correct_answer":"The risk that the other party in a financial transaction will default on their obligations","explanation":"Counterparty risk is particularly important in OTC derivatives, repo agreements, and securities lending, where the failure of one party can cause significant financial losses for the other."},{"id":204,"type":"true_false","difficulty":"basic","topic":"Portfolio Management","question":"Modern Portfolio Theory was developed by Harry Markowitz and shows that investors can reduce risk through diversification without sacrificing expected returns.","correct_answer":true,"explanation":"Markowitz's MPT (1952) demonstrated that combining assets with low correlations reduces portfolio variance without proportionally reducing expected returns — the foundation of modern portfolio construction."},{"id":205,"type":"sorting","difficulty":"pro","topic":"Foundations of Alternative Investments","question":"Rank these institutional investors from typically most to least conservative in their alternative investment allocation approach:","items":["University Endowment","Insurance Company","Pension Fund","Sovereign Wealth Fund"],"correct_order":["Insurance Company","Pension Fund","Sovereign Wealth Fund","University Endowment"],"explanation":"Insurance companies face strict regulatory capital requirements and liquidity needs. Pension funds manage liability-matched assets. SWFs have longer horizons and fewer immediate liabilities. Endowments have perpetual horizons and pioneered the alternatives-heavy endowment model."},{"id":206,"type":"multiple_choice","difficulty":"pro","topic":"Commodities","question":"In commodity trading, what is 'basis risk' and why does it matter for hedgers?","options":["The risk that the hedge instrument expires before the exposure is fully hedged","The risk that the price difference between the specific physical commodity being hedged and the standardized futures contract used to hedge it changes unexpectedly","The risk that commodity prices trend in one direction for an extended period","The risk that margin requirements increase during volatile markets"],"correct_answer":"The risk that the price difference between the specific physical commodity being hedged and the standardized futures contract used to hedge it changes unexpectedly","explanation":"An airline hedging jet fuel with crude oil futures faces basis risk: if the jet fuel/crude spread (the crack spread) widens, the crude futures hedge doesn't fully offset the increase in jet fuel costs. Perfect hedges are rare because traded futures don't always match exact physical exposures."},{"id":207,"type":"true_false","difficulty":"pro","topic":"Venture Capital","question":"Y Combinator's standard deal of $500K for 7% equity means the startup is valued at approximately $7.1M post-money.","correct_answer":true,"explanation":"Post-money valuation = Investment / Equity percentage = $500K / 7% = $7.14M. Pre-money valuation = $7.14M - $500K = $6.64M. This is consistent with YC's standard terms for early-stage companies."},{"id":208,"type":"multiple_choice","difficulty":"expert","topic":"Risk Management","question":"Why is 'liquidity-adjusted VaR' (LVaR) a more appropriate risk measure for alternative investment portfolios than standard VaR?","options":["LVaR uses a longer time horizon automatically","LVaR adjusts the standard VaR loss estimate by the bid-ask spread and market impact of liquidating positions — recognizing that illiquid positions cannot be sold at mid-market prices during stress","LVaR uses Monte Carlo simulation instead of historical simulation","LVaR measures currency risk in addition to market risk"],"correct_answer":"LVaR adjusts the standard VaR loss estimate by the bid-ask spread and market impact of liquidating positions — recognizing that illiquid positions cannot be sold at mid-market prices during stress","explanation":"Standard VaR assumes positions can be liquidated at current market prices. For illiquid assets (private equity, real estate, distressed credit), actual liquidation involves significant discounts and market impact. LVaR adds a liquidity cost adjustment to capture the true cost of exiting under stress."},{"id":209,"type":"multiple_choice","difficulty":"first_steps","topic":"Private Equity","question":"What is a 'portfolio company' in private equity?","options":["A company that manages a PE fund's investments","A company in which a PE fund has invested","A holding company that owns multiple PE funds","The GP's personal investment company"],"correct_answer":"A company in which a PE fund has invested","explanation":"Portfolio companies are the businesses owned (fully or partially) by a PE fund. The GP actively manages and oversees these companies to create value before exiting via sale, IPO, or secondary transaction."},{"id":210,"type":"true_false","difficulty":"basic","topic":"Foundations of Alternative Investments","question":"ESG factors (Environmental, Social, Governance) are increasingly integrated into alternative investment due diligence and portfolio management.","correct_answer":true,"explanation":"ESG integration is now standard practice for most institutional investors. LP demands, regulatory pressure (especially AIFMD in Europe), and evidence that ESG risks can materially impact returns have made ESG analysis a core part of alternative investment processes."},{"id":211,"type":"multiple_choice","difficulty":"pro","topic":"Real Assets","question":"Which of the following BEST describes the 'long-lease' strategy in real estate investing?","options":["Acquiring properties with leases longer than 20 years to maximize rental income stability","Purchasing vacant land and waiting for appreciation","Acquiring properties with short leases to capture mark-to-market rental upside quickly","Financing real estate acquisitions with 20-year fixed rate mortgages"],"correct_answer":"Acquiring properties with leases longer than 20 years to maximize rental income stability","explanation":"Long-lease strategies target properties with very long-dated leases (20–99 years) to investment-grade tenants, generating bond-like income streams with minimal leasing risk. Pension funds and insurers favor this for liability matching."},{"id":212,"type":"true_false","difficulty":"expert","topic":"Hedge Funds","question":"An activist hedge fund acquiring a 9.9% stake in a company can typically avoid triggering a Schedule 13D filing with the SEC, which would require disclosure of activist intentions.","correct_answer":false,"explanation":"The 5% threshold (not 10%) triggers Schedule 13G/13D filing requirements. Any acquisition above 5% of a public company's shares requires disclosure. Activists use 13G for passive disclosure but must file 13D with specific plans/intentions when they intend to influence the company."},{"id":213,"type":"multiple_choice","difficulty":"expert","topic":"Portfolio Management","question":"In the context of pension fund investing, what does 'liability-driven investment (LDI)' strategy primarily aim to achieve?","options":["Maximizing total portfolio return by investing entirely in growth assets","Hedging the interest rate and inflation sensitivity of pension liabilities using duration-matched assets, minimizing surplus volatility rather than maximizing absolute returns","Generating income to cover current benefit payments only","Reducing investment management fees by using passive strategies"],"correct_answer":"Hedging the interest rate and inflation sensitivity of pension liabilities using duration-matched assets, minimizing surplus volatility rather than maximizing absolute returns","explanation":"LDI focuses on the pension's funded status (assets minus PV of liabilities) rather than absolute portfolio returns. By matching asset duration to liability duration, rate changes affect assets and liabilities equally, preserving funded status. Return-seeking assets are held separately to improve the funded ratio over time."},{"id":214,"type":"sorting","difficulty":"expert","topic":"Private Equity","question":"Rank these private equity value creation strategies from most to least common as a PRIMARY driver of returns in large-cap buyouts:","items":["Revenue growth from organic expansion","Financial engineering (leverage/recapitalization)","Multiple expansion","Operational EBITDA margin improvement"],"correct_order":["Operational EBITDA margin improvement","Multiple expansion","Revenue growth from organic expansion","Financial engineering (leverage/recapitalization)"],"explanation":"Academic studies (McKinsey, BCG) show operational improvement and multiple expansion are the dominant drivers in large-cap buyouts. Revenue growth is important but harder to achieve in mature companies. Pure financial engineering (leverage) has decreased in importance as regulators have tightened LBO lending and competition has grown."},{"id":215,"type":"multiple_choice","difficulty":"first_steps","topic":"Foundations of Alternative Investments","question":"Which of the following best describes a 'closed-end fund'?","options":["A fund that accepts new investors continuously","A fund with a fixed number of shares that raises capital once and returns it at the end of a set period","A fund that is closed to new investments permanently","A fund that only invests in closed markets"],"correct_answer":"A fund with a fixed number of shares that raises capital once and returns it at the end of a set period","explanation":"Closed-end funds (like most PE and VC funds) raise a fixed amount of capital during a fundraising period, invest it over a defined period, and return proceeds to investors at the end of the fund's life — typically 10 years."},{"id":216,"type":"true_false","difficulty":"basic","topic":"Hedge Funds","question":"A trend-following CTA strategy typically performs well during periods of sustained directional price moves in any asset class.","correct_answer":true,"explanation":"CTAs using trend-following models profit from strong, sustained trends across equities, bonds, currencies, and commodities — regardless of direction. They struggle in choppy, mean-reverting markets with no sustained trends."},{"id":217,"type":"multiple_choice","difficulty":"basic","topic":"Private Equity","question":"What is a 'roll-up strategy' in private equity?","options":["Rolling debt forward to extend its maturity","Acquiring multiple small companies in a fragmented industry and consolidating them into a larger entity","Gradually building up a stake in a public company before a takeover","Rolling LP commitments from one fund to the next"],"correct_answer":"Acquiring multiple small companies in a fragmented industry and consolidating them into a larger entity","explanation":"Roll-up (or platform + add-on) strategies create value by consolidating fragmented industries, achieving economies of scale, pricing power, and multiple expansion as a larger entity commands a higher valuation multiple."},{"id":218,"type":"true_false","difficulty":"pro","topic":"Portfolio Management","question":"The Sortino ratio is a better risk-adjusted performance metric than the Sharpe ratio for evaluating hedge funds that intentionally limit downside volatility while accepting upside volatility.","correct_answer":true,"explanation":"The Sortino ratio uses downside deviation (only negative deviations from target) rather than total standard deviation. For strategies that are asymmetric (more upside volatility than downside), Sortino better captures the manager's skill in protecting against losses."},{"id":219,"type":"multiple_choice","difficulty":"pro","topic":"Venture Capital","question":"Why do venture capital funds typically invest in 20-30 companies rather than concentrating in 3-5 top picks?","options":["VC regulations require broad diversification","The power law of VC returns means most portfolio companies fail, but 1-2 outlier investments can return the entire fund — diversification ensures exposure to potential outliers","VC funds need many companies to justify their management fees","Spreading investments reduces the GP's carried interest obligations"],"correct_answer":"The power law of VC returns means most portfolio companies fail, but 1-2 outlier investments can return the entire fund — diversification ensures exposure to potential outliers","explanation":"VC returns follow a power law: the best investment in a portfolio typically generates more returns than all others combined. With high failure rates (60-70% of portfolio companies return <1x), broad diversification is necessary to ensure the fund is invested in potential 100x winners."},{"id":220,"type":"true_false","difficulty":"expert","topic":"Real Assets","question":"Farmland and timberland investments share the characteristic of 'biological optionality' — the ability to defer harvesting during unfavorable price environments and accelerate during favorable ones.","correct_answer":true,"explanation":"Both timber and agricultural crops can, to varying degrees, be stored on the stump/stem or harvested based on market conditions. Timber especially benefits from this: standing trees continue to grow biologically, creating a natural inventory flexibility that financial assets don't have."},{"id":221,"type":"multiple_choice","difficulty":"basic","topic":"Foundations of Alternative Investments","question":"What is an 'accredited investor'?","options":["An investor with a degree in finance or economics","An investor certified by the CFA Institute","An individual meeting minimum wealth or income thresholds that permit investment in private offerings","Any investor who has completed a financial literacy course"],"correct_answer":"An individual meeting minimum wealth or income thresholds that permit investment in private offerings","explanation":"Under SEC rules, accredited investors must have a net worth over $1 million (excluding primary residence) or annual income over $200K ($300K jointly) — or hold certain professional certifications. This status allows access to private placements, hedge funds, and PE funds."},{"id":222,"type":"true_false","difficulty":"first_steps","topic":"Portfolio Management","question":"A portfolio with a negative alpha has underperformed its benchmark on a risk-adjusted basis.","correct_answer":true,"explanation":"Negative alpha means the portfolio returned less than expected given its level of risk. A manager with negative alpha has destroyed value relative to what could have been achieved through passive market exposure."},{"id":223,"type":"sorting","difficulty":"basic","topic":"Hedge Funds","question":"Sort these hedge fund strategy types from most market-correlated to least market-correlated:","items":["Market Neutral Equity","Global Macro","Long/Short Equity (70% net long)","Managed Futures CTA"],"correct_order":["Long/Short Equity (70% net long)","Global Macro","Managed Futures CTA","Market Neutral Equity"],"explanation":"70% net long L/S has high equity market correlation. Global macro has moderate correlation depending on positioning. CTAs have near-zero or even negative correlation in market crises (crisis alpha). Market neutral is designed for zero correlation."},{"id":224,"type":"multiple_choice","difficulty":"expert","topic":"Private Equity","question":"What is the key strategic rationale for a PE firm choosing a 'buy-and-build' strategy over a single large-cap buyout?","options":["Buy-and-build transactions are always available at lower multiples","Acquiring smaller companies at lower revenue multiples and consolidating them creates a larger platform that commands a higher exit multiple, generating arbitrage between small-cap and mid/large-cap valuation differentials","Buy-and-build strategies require less management time post-acquisition","Regulatory approval is unnecessary for sub-scale acquisitions"],"correct_answer":"Acquiring smaller companies at lower revenue multiples and consolidating them creates a larger platform that commands a higher exit multiple, generating arbitrage between small-cap and mid/large-cap valuation differentials","explanation":"The 'multiple arbitrage' in roll-ups is the key thesis: small companies trade at 4–6x EBITDA; large companies at 10–14x. By buying small and selling large, PE creates value through scale even without operational improvement. The risk is integration complexity and overpaying in competitive add-on markets."},{"id":225,"type":"true_false","difficulty":"pro","topic":"Risk Management","question":"When a hedge fund's prime broker increases margin requirements (haircuts) on the fund's positions, it creates a procyclical deleveraging dynamic that can amplify market volatility.","correct_answer":true,"explanation":"Margin spirals are a key systemic risk mechanism: market prices fall → securities values as collateral decrease → lenders demand more collateral → funds forced to sell assets to meet margin calls → more selling → prices fall further. This feedback loop was a key driver of 2008 crisis dynamics."},{"id":226,"type":"multiple_choice","difficulty":"first_steps","topic":"Venture Capital","question":"What is an 'angel investor'?","options":["A government-backed startup funding program","An individual providing early-stage capital to startups in exchange for equity","A VC fund that specializes in nonprofit organizations","An investor who only funds companies with positive social impact"],"correct_answer":"An individual providing early-stage capital to startups in exchange for equity","explanation":"Angel investors are typically high-net-worth individuals who invest their own capital in pre-seed and seed stage companies, often before institutional VC funding is available. They typically invest $25K–$500K per deal."},{"id":227,"type":"true_false","difficulty":"basic","topic":"Real Assets","question":"A brownfield infrastructure investment carries more construction risk than a greenfield investment.","correct_answer":false,"explanation":"It's the opposite — greenfield investments involve constructing new assets and carry significant construction, permitting, and revenue ramp-up risks. Brownfield investments are in already-operational assets with established revenue streams and lower risk profiles."},{"id":228,"type":"multiple_choice","difficulty":"pro","topic":"Hedge Funds","question":"What distinguishes an 'activist' hedge fund strategy from a traditional long/short equity strategy?","options":["Activists use more leverage than traditional long/short funds","Activists accumulate large stakes in companies and actively pressure management for strategic, operational, or governance changes to unlock value","Activists only short-sell stocks they believe are overvalued","Activist funds are regulated differently from other hedge funds"],"correct_answer":"Activists accumulate large stakes in companies and actively pressure management for strategic, operational, or governance changes to unlock value","explanation":"Activist investing involves using ownership as a tool to force change — demanding board seats, share buybacks, spin-offs, or management changes. Unlike passive long/short, activists directly create the value catalyst they are betting on."},{"id":229,"type":"true_false","difficulty":"expert","topic":"Foundations of Alternative Investments","question":"The evergreen fund structure is primarily designed to solve the cash drag and commitment pacing challenges faced by institutional investors in traditional closed-end PE funds.","correct_answer":true,"explanation":"Evergreen (open-ended) fund structures allow continuous subscriptions/redemptions, eliminating the J-curve, capital call management, and vintage year concentration issues of closed-end funds. They particularly help smaller institutions and private wealth channel investors who cannot manage complex PE programs."},{"id":230,"type":"multiple_choice","difficulty":"expert","topic":"Risk Management","question":"Which scenario represents 'model risk' in a quantitative hedge fund context?","options":["A market move that the model correctly predicted but the fund failed to trade","A fund manager ignoring model signals based on personal conviction","A model built on historical data that fails out-of-sample because it captured spurious correlations rather than genuine economic relationships","The risk that a quant competitor discovers the same trading signal"],"correct_answer":"A model built on historical data that fails out-of-sample because it captured spurious correlations rather than genuine economic relationships","explanation":"Model risk includes overfitting (data-mining bias): testing thousands of signals against historical data will find 'significant' patterns by chance. Models that look great in-sample but fail out-of-sample are a fundamental risk in quantitative investing — reinforcing the need for economic intuition, walk-forward testing, and adequate out-of-sample data."},{"id":231,"type":"sorting","difficulty":"expert","topic":"Venture Capital","question":"Rank these VC investment characteristics from most to least important when evaluating an early-stage B2B SaaS investment:","items":["Current revenue level","Quality of founding team","Market size (TAM)","Product-market fit evidence"],"correct_order":["Quality of founding team","Market size (TAM)","Product-market fit evidence","Current revenue level"],"explanation":"At early stage, team quality is paramount (great teams pivot to success). TAM determines potential scale. PMF evidence (retention, NPS, usage patterns) shows product viability. Current revenue is least important — most early-stage companies are pre-revenue when funded by institutional VCs."},{"id":232,"type":"multiple_choice","difficulty":"pro","topic":"Portfolio Management","question":"What is 'commitment pacing' in a private equity program and why is it important?","options":["The pace at which portfolio companies are acquired by the PE fund","The schedule by which an LP commits capital to PE funds over time, designed to achieve target allocation, maintain vintage diversification, and manage cash flows","The rate at which the GP makes capital calls from LPs","The speed at which portfolio companies repay LBO debt"],"correct_answer":"The schedule by which an LP commits capital to PE funds over time, designed to achieve target allocation, maintain vintage diversification, and manage cash flows","explanation":"Commitment pacing is a multi-year LP planning process: committing too much in one year creates vintage concentration; too little creates undershoot of target allocation. Pacing models balance J-curve cash outflows, expected distributions, and desired steady-state allocation level."},{"id":233,"type":"true_false","difficulty":"basic","topic":"Commodities","question":"Managed futures strategies typically have low or negative correlation with equity markets, providing diversification benefits during equity market downturns.","correct_answer":true,"explanation":"CTAs' trend-following across global futures markets creates low average correlation with equities. During equity bear markets, CTAs often generate positive returns by trending short equities and long bonds/gold — providing valuable 'crisis alpha'."},{"id":234,"type":"multiple_choice","difficulty":"expert","topic":"Real Assets","question":"Why do infrastructure investments tend to benefit from 'natural monopoly'
