["path",{d:"m7 10 5 5 5-5",key:"brsn70"}]],fp=ni("download",sv);const ov=[["path",{d:"M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8",key:"5wwlr5"}],["path",{d:"M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z",key:"r6nss1"}]],lv=ni("house",ov);const cv=[["path",{d:"M5 12h14",key:"1ays0h"}],["path",{d:"M12 5v14",key:"s699le"}]],pp=ni("plus",cv);const uv=[["path",{d:"m21 21-4.34-4.34",key:"14j7rj"}],["circle",{cx:"11",cy:"11",r:"8",key:"4ej97u"}]],dv=ni("search",uv);const fv=[["path",{d:"M18 6 6 18",key:"1bl5f8"}],["path",{d:"m6 6 12 12",key:"d8bk6v"}]],mp=ni("x",fv),pv={title:"Alternative Investments Question Bank",description:"Comprehensive quiz database covering CAIA curriculum and alternative investments ecosystem",version:"1.0",total_questions:480,difficulty_levels:[{id:"first_steps",label:"First Steps",description:"Basic concepts — what each asset class is and how it works"},{id:"basic",label:"Basic",description:"Vocabulary, definitions and new concepts"},{id:"pro",label:"Pro",description:"Processes, mechanics, key actors and how things work in practice"},{id:"expert",label:"Expert",description:"Tricky, nuanced and advanced concepts — the highest challenge"}],question_types:["multiple_choice","true_false","sorting"],topics:["Foundations of Alternative Investments","Commodities","Hedge Funds","Private Equity","Real Assets","Risk Management","Portfolio Management","Venture Capital"]},mv=JSON.parse(`[{"id":1,"type":"true_false","difficulty":"first_steps","topic":"Foundations of Alternative Investments","question":"Alternative investments include assets beyond traditional stocks, bonds, and cash.","correct_answer":true,"explanation":"Alternative investments are defined as asset classes beyond traditional equities, fixed income, and cash — including private equity, hedge funds, real assets, and commodities."},{"id":2,"type":"multiple_choice","difficulty":"first_steps","topic":"Foundations of Alternative Investments","question":"Which of the following is considered an alternative investment?","options":["A savings account","Government bonds","Private equity","Blue-chip stocks"],"correct_answer":"Private equity","explanation":"Private equity is a core alternative investment category. Savings accounts, government bonds, and blue-chip stocks are all traditional investment types."},{"id":3,"type":"true_false","difficulty":"first_steps","topic":"Foundations of Alternative Investments","question":"Alternative investments are generally more liquid than stocks traded on public exchanges.","correct_answer":false,"explanation":"Alternative investments are typically less liquid than publicly traded stocks. This illiquidity is one of their defining characteristics, and investors demand an illiquidity premium as compensation."},{"id":4,"type":"multiple_choice","difficulty":"first_steps","topic":"Foundations of Alternative Investments","question":"What is the main reason investors add alternative investments to a portfolio?","options":["To increase trading frequency","To reduce diversification","To improve risk-adjusted returns through diversification","To avoid taxes"],"correct_answer":"To improve risk-adjusted returns through diversification","explanation":"The primary rationale for alternatives is their low correlation to traditional assets, which improves portfolio diversification and can enhance risk-adjusted returns."},{"id":5,"type":"true_false","difficulty":"first_steps","topic":"Foundations of Alternative Investments","question":"Hedge funds are available to any retail investor without restrictions.","correct_answer":false,"explanation":"Hedge funds are typically restricted to accredited investors (with $1M+ net worth or $200K+ annual income) or qualified purchasers ($5M+ in investments) due to their complexity and risk."},{"id":6,"type":"multiple_choice","difficulty":"first_steps","topic":"Private Equity","question":"What does private equity primarily invest in?","options":["Government bonds","Publicly traded stocks","Private companies not listed on public exchanges","Real estate only"],"correct_answer":"Private companies not listed on public exchanges","explanation":"Private equity invests in companies that are not listed on public stock exchanges, aiming to improve them and generate returns through eventual sale or IPO."},{"id":7,"type":"true_false","difficulty":"first_steps","topic":"Private Equity","question":"In private equity, the General Partner (GP) manages the fund while Limited Partners (LPs) provide most of the capital.","correct_answer":true,"explanation":"The GP is the fund manager who makes investment decisions and manages portfolio companies. LPs are the investors who commit most of the capital but do not participate in daily management."},{"id":8,"type":"multiple_choice","difficulty":"first_steps","topic":"Private Equity","question":"What is carried interest?","options":["Interest earned on bonds held in a fund","The GP's share of profits from fund investments","The annual management fee charged to LPs","The cost of borrowing to fund acquisitions"],"correct_answer":"The GP's share of profits from fund investments","explanation":"Carried interest is the performance-based compensation paid to the GP, typically 20% of profits above the hurdle rate. It aligns the GP's interests with those of the LPs."},{"id":9,"type":"true_false","difficulty":"first_steps","topic":"Venture Capital","question":"Venture capital typically invests in early-stage, high-growth potential companies.","correct_answer":true,"explanation":"Venture capital funds provide capital to startups and early-stage companies with high growth potential in exchange for equity, accepting higher risk for the potential of exceptional returns."},{"id":10,"type":"multiple_choice","difficulty":"first_steps","topic":"Venture Capital","question":"Which term describes a private startup valued at over $1 billion?","options":["Dragon","Unicorn","Phoenix","Griffin"],"correct_answer":"Unicorn","explanation":"A 'unicorn' is a privately held startup with a valuation exceeding $1 billion — a term coined to reflect how rare such companies once were."},{"id":11,"type":"true_false","difficulty":"first_steps","topic":"Hedge Funds","question":"Hedge funds can only make money when markets go up.","correct_answer":false,"explanation":"Hedge funds use strategies like short selling, derivatives, and leverage to generate returns in both rising and falling markets — targeting absolute returns regardless of market direction."},{"id":12,"type":"multiple_choice","difficulty":"first_steps","topic":"Hedge Funds","question":"What does a hedge fund's 'lock-up period' refer to?","options":["The time it takes to execute a trade","A period during which investors cannot withdraw their capital","The time the fund is closed to new investors","The duration of a short position"],"correct_answer":"A period during which investors cannot withdraw their capital","explanation":"A lock-up period prevents investors from redeeming their capital for a specified time after investing, allowing the manager to execute longer-term or less liquid strategies."},{"id":13,"type":"true_false","difficulty":"first_steps","topic":"Commodities","question":"Gold and crude oil are examples of commodities.","correct_answer":true,"explanation":"Gold (a precious metal) and crude oil (an energy commodity) are classic examples of commodities — basic goods that are interchangeable with others of the same type."},{"id":14,"type":"multiple_choice","difficulty":"first_steps","topic":"Commodities","question":"Which of the following best describes a 'soft commodity'?","options":["Crude oil","Gold","Copper","Wheat"],"correct_answer":"Wheat","explanation":"Soft commodities are agricultural products that are grown rather than mined. Wheat, corn, coffee, and sugar are soft commodities. Crude oil, gold, and copper are hard commodities."},{"id":15,"type":"true_false","difficulty":"first_steps","topic":"Real Assets","question":"Real assets are physical or tangible assets such as real estate and infrastructure.","correct_answer":true,"explanation":"Real assets are physical assets with intrinsic value, including real estate, infrastructure, timberland, farmland, and commodities. They often provide inflation protection."},{"id":16,"type":"multiple_choice","difficulty":"first_steps","topic":"Real Assets","question":"Which of the following is an example of infrastructure investment?","options":["Buying shares of a tech startup","Acquiring a toll road","Purchasing government bonds","Investing in a hedge fund"],"correct_answer":"Acquiring a toll road","explanation":"Infrastructure investments include physical systems essential to economies — such as toll roads, airports, utilities, and pipelines — that generate long-term, stable cash flows."},{"id":17,"type":"true_false","difficulty":"first_steps","topic":"Risk Management","question":"Diversification can eliminate all risk from a portfolio.","correct_answer":false,"explanation":"Diversification can eliminate idiosyncratic (company-specific) risk but cannot eliminate systematic (market-wide) risk, which affects all investments simultaneously."},{"id":18,"type":"multiple_choice","difficulty":"first_steps","topic":"Risk Management","question":"What does a portfolio's 'drawdown' measure?","options":["The total return over a period","The peak-to-trough decline in portfolio value","The amount of leverage used","The number of losing trades"],"correct_answer":"The peak-to-trough decline in portfolio value","explanation":"A drawdown measures the decline in value from a portfolio's peak to its subsequent trough, expressing the worst-case loss experienced over a specific period."},{"id":19,"type":"true_false","difficulty":"first_steps","topic":"Portfolio Management","question":"Asset allocation refers to how a portfolio is divided across different asset classes.","correct_answer":true,"explanation":"Asset allocation is the process of distributing a portfolio's capital among different asset categories such as equities, bonds, real estate, and alternatives."},{"id":20,"type":"multiple_choice","difficulty":"first_steps","topic":"Portfolio Management","question":"What does the Sharpe ratio measure?","options":["Total return of a portfolio","Volatility of individual stocks","Return earned per unit of total risk","Amount of leverage in a portfolio"],"correct_answer":"Return earned per unit of total risk","explanation":"The Sharpe ratio measures risk-adjusted return: excess return above the risk-free rate divided by standard deviation. A higher Sharpe ratio indicates better risk-adjusted performance."},{"id":21,"type":"multiple_choice","difficulty":"basic","topic":"Foundations of Alternative Investments","question":"What is the 'illiquidity premium' in alternative investments?","options":["A penalty charged for early redemption","Extra return demanded for holding assets that cannot be easily sold","A fee charged by fund administrators","The interest rate spread between corporate and government bonds"],"correct_answer":"Extra return demanded for holding assets that cannot be easily sold","explanation":"The illiquidity premium compensates investors for accepting reduced marketability. Investors in PE and infrastructure expect 2–4% higher returns than comparable liquid assets."},{"id":22,"type":"true_false","difficulty":"basic","topic":"Foundations of Alternative Investments","question":"A high-water mark ensures that a hedge fund manager does not collect performance fees twice on the same gains.","correct_answer":true,"explanation":"The high-water mark is the peak NAV a fund has reached. Performance fees are only charged on new net profits above the high-water mark, protecting investors from paying twice on recovered losses."},{"id":23,"type":"multiple_choice","difficulty":"basic","topic":"Foundations of Alternative Investments","question":"What is a 'Fund of Funds' (FoF)?","options":["A fund that only invests in government bonds","A fund that invests in other funds rather than directly in securities","A fund with multiple share classes","A fund managed by multiple GPs simultaneously"],"correct_answer":"A fund that invests in other funds rather than directly in securities","explanation":"A Fund of Funds allocates capital across multiple underlying funds, providing diversification across managers and strategies, but adds an additional layer of fees."},{"id":24,"type":"true_false","difficulty":"basic","topic":"Foundations of Alternative Investments","question":"The '2 and 20' fee structure means a 2% performance fee and 20% management fee.","correct_answer":false,"explanation":"The '2 and 20' structure refers to a 2% annual management fee (on AUM) and a 20% performance fee (carried interest on profits). Not the reverse."},{"id":25,"type":"multiple_choice","difficulty":"basic","topic":"Foundations of Alternative Investments","question":"Which term describes the minimum return LPs must receive before a GP earns carried interest?","options":["Alpha","High-water mark","Hurdle rate","Beta"],"correct_answer":"Hurdle rate","explanation":"The hurdle rate (also called preferred return) is the minimum return threshold that must be achieved before the GP participates in profits via carried interest."},{"id":26,"type":"sorting","difficulty":"basic","topic":"Venture Capital","question":"Arrange these venture capital funding stages in the correct order from earliest to latest:","items":["Series B","IPO","Seed Round","Series A"],"correct_order":["Seed Round","Series A","Series B","IPO"],"explanation":"Startup financing typically progresses: Seed → Series A → Series B (and further rounds) → IPO. Each stage represents increasing scale and decreasing risk."},{"id":27,"type":"multiple_choice","difficulty":"basic","topic":"Venture Capital","question":"What is a 'down round' in venture capital?","options":["When a startup reduces its headcount","A funding round at a lower valuation than the previous round","When an investor reduces its position","A round that closes below its fundraising target"],"correct_answer":"A funding round at a lower valuation than the previous round","explanation":"A down round occurs when a company raises capital at a valuation lower than its previous round, diluting existing shareholders and often triggering anti-dilution protections."},{"id":28,"type":"true_false","difficulty":"basic","topic":"Venture Capital","question":"A company's 'burn rate' refers to how quickly it spends its cash reserves.","correct_answer":true,"explanation":"Burn rate measures how fast a startup uses its cash to cover operating expenses. A high burn rate relative to cash reserves creates urgency to raise new capital."},{"id":29,"type":"multiple_choice","difficulty":"basic","topic":"Private Equity","question":"What is a Leveraged Buyout (LBO)?","options":["A company buying back its own shares using cash reserves","An acquisition funded primarily with a large amount of borrowed money","A management team acquiring a competitor","An IPO financed by institutional investors"],"correct_answer":"An acquisition funded primarily with a large amount of borrowed money","explanation":"In an LBO, a PE firm acquires a company using mostly debt (typically 60–70%) and a smaller equity component. The acquired company's assets and cash flows service the debt."},{"id":30,"type":"true_false","difficulty":"basic","topic":"Private Equity","question":"The J-Curve in private equity describes a pattern where early returns are negative before becoming positive.","correct_answer":true,"explanation":"The J-Curve reflects negative early cash flows from fees and capital deployment before any exits occur, followed by positive returns as investments mature — forming a J-shaped return pattern."},{"id":31,"type":"multiple_choice","difficulty":"basic","topic":"Private Equity","question":"What does MOIC stand for in private equity?","options":["Managed Output Investment Capital","Multiple on Invested Capital","Minimum Operating Income Calculation","Market Opportunity Investment Criteria"],"correct_answer":"Multiple on Invested Capital","explanation":"MOIC measures total value returned divided by total capital invested. A 3x MOIC means $3 was returned for every $1 invested, regardless of the time taken to achieve it."},{"id":32,"type":"multiple_choice","difficulty":"basic","topic":"Hedge Funds","question":"What is short selling?","options":["Selling assets below market value to raise cash quickly","Borrowing and selling securities with the expectation of buying them back at a lower price","Selling options contracts to earn premium income","Reducing portfolio duration by selling long-dated bonds"],"correct_answer":"Borrowing and selling securities with the expectation of buying them back at a lower price","explanation":"Short selling involves borrowing securities, selling them at current prices, and hoping to repurchase them cheaper in the future — profiting from the price decline."},{"id":33,"type":"true_false","difficulty":"basic","topic":"Hedge Funds","question":"A global macro hedge fund bases its investment decisions on macroeconomic analysis of national economies and geopolitical events.","correct_answer":true,"explanation":"Global macro funds take positions across currencies, interest rates, equities, and commodities based on macroeconomic trends and geopolitical analysis."},{"id":34,"type":"multiple_choice","difficulty":"basic","topic":"Commodities","question":"What is contango in commodity markets?","options":["When spot prices are higher than futures prices","When futures prices are higher than spot prices","When commodity prices are falling rapidly","When supply equals demand"],"correct_answer":"When futures prices are higher than spot prices","explanation":"Contango is a market condition where futures prices exceed the current spot price. This creates a negative roll yield for long-only investors as they roll into higher-priced contracts."},{"id":35,"type":"true_false","difficulty":"basic","topic":"Commodities","question":"Backwardation in commodity markets creates a positive roll yield for long-only investors.","correct_answer":true,"explanation":"In backwardation, futures prices are below the spot price. When long-only investors roll expiring contracts, they sell at higher near-term prices and buy cheaper forward contracts, generating positive roll yield."},{"id":36,"type":"multiple_choice","difficulty":"basic","topic":"Real Assets","question":"What is a REIT?","options":["A type of private equity fund focused on real estate","A publicly traded company that owns income-producing real estate","A government program for affordable housing","A real estate valuation method"],"correct_answer":"A publicly traded company that owns income-producing real estate","explanation":"REITs (Real Estate Investment Trusts) are companies that own, operate, or finance income-producing real estate. They must distribute at least 90% of taxable income and are publicly traded."},{"id":37,"type":"true_false","difficulty":"basic","topic":"Real Assets","question":"Timberland investments generate returns only from cutting and selling timber.","correct_answer":false,"explanation":"Timberland returns come from multiple sources: biological growth of trees, timber harvesting income, and land value appreciation over time."},{"id":38,"type":"multiple_choice","difficulty":"basic","topic":"Risk Management","question":"What does Value at Risk (VaR) measure?","options":["The maximum possible loss of a portfolio","The potential loss in value of a portfolio over a period at a given confidence level","The average return of a portfolio","The volatility-adjusted return"],"correct_answer":"The potential loss in value of a portfolio over a period at a given confidence level","explanation":"VaR estimates the maximum loss over a specified period with a given confidence level (e.g., 95%). A 1-day 95% VaR of $1M means there is a 5% chance of losing more than $1M in one day."},{"id":39,"type":"true_false","difficulty":"basic","topic":"Risk Management","question":"Systematic risk can be eliminated through diversification.","correct_answer":false,"explanation":"Only idiosyncratic (company-specific) risk can be eliminated through diversification. Systematic risk — market-wide risk — affects all assets and cannot be diversified away."},{"id":40,"type":"multiple_choice","difficulty":"basic","topic":"Portfolio Management","question":"What is alpha in portfolio management?","options":["Market return","Excess return above the benchmark after adjusting for risk","The correlation between two assets","The portfolio's standard deviation"],"correct_answer":"Excess return above the benchmark after adjusting for risk","explanation":"Alpha represents the value added by a fund manager beyond what can be explained by market exposure (beta). Positive alpha indicates outperformance on a risk-adjusted basis."},{"id":41,"type":"sorting","difficulty":"basic","topic":"Portfolio Management","question":"Rank these performance metrics from most to least focused on downside risk:","items":["Sharpe Ratio","Maximum Drawdown","Sortino Ratio","Calmar Ratio"],"correct_order":["Maximum Drawdown","Calmar Ratio","Sortino Ratio","Sharpe Ratio"],"explanation":"Maximum Drawdown directly measures worst losses. Calmar Ratio uses max drawdown as denominator. Sortino Ratio uses downside deviation. Sharpe Ratio uses total standard deviation (both up and down)."},{"id":42,"type":"true_false","difficulty":"basic","topic":"Portfolio Management","question":"The Efficient Frontier represents the set of portfolios offering the highest return for a given level of risk.","correct_answer":true,"explanation":"The Efficient Frontier is the set of optimal portfolios in Modern Portfolio Theory — those offering the maximum expected return for each level of risk (or minimum risk for each return level)."},{"id":43,"type":"multiple_choice","difficulty":"basic","topic":"Foundations of Alternative Investments","question":"What is the 'vintage year' of a private equity fund?","options":["The year the fund was legally registered","The year the fund made its first investment or capital call","The year the fund reached its target size","The year the fund was fully liquidated"],"correct_answer":"The year the fund made its first investment or capital call","explanation":"Vintage year is used to benchmark fund performance against peers raised in the same period, as macroeconomic conditions at the time of deployment significantly affect returns."},{"id":44,"type":"true_false","difficulty":"basic","topic":"Foundations of Alternative Investments","question":"Dry powder refers to uncommitted capital available for investment in private equity and venture capital funds.","correct_answer":true,"explanation":"Dry powder represents committed but undeployed capital. High industry dry powder increases competition for deals and can inflate acquisition valuations."},{"id":45,"type":"multiple_choice","difficulty":"basic","topic":"Hedge Funds","question":"What is a 'side pocket' in a hedge fund?","options":["An additional share class for institutional investors","A segregated account for illiquid or hard-to-value investments","The GP's personal investment in the fund","A reserve account for management fees"],"correct_answer":"A segregated account for illiquid or hard-to-value investments","explanation":"A side pocket separates illiquid investments from the main liquid portfolio. Investors cannot redeem their side pocket allocation until the illiquid asset is realized."},{"id":46,"type":"multiple_choice","difficulty":"basic","topic":"Commodities","question":"What is the 'roll yield' in commodity futures investing?","options":["The yield earned from holding physical commodities in storage","The profit or loss from rolling futures contracts to the next expiry","The dividend yield from commodity company stocks","The interest earned on margin deposits"],"correct_answer":"The profit or loss from rolling futures contracts to the next expiry","explanation":"Roll yield is the gain (in backwardation) or loss (in contango) generated when a futures contract is replaced with the next contract before expiry. It is a key component of commodity futures returns."},{"id":47,"type":"true_false","difficulty":"basic","topic":"Private Equity","question":"A clawback provision allows LPs to reclaim previously paid carried interest if the fund ultimately underperforms.","correct_answer":true,"explanation":"The clawback provision protects LPs by requiring the GP to return carried interest already received if subsequent underperformance means the GP was overpaid relative to actual overall fund returns."},{"id":48,"type":"multiple_choice","difficulty":"basic","topic":"Real Assets","question":"What does the capitalization rate (cap rate) measure in real estate?","options":["The amount of debt used to acquire a property","Net operating income divided by property market value","The appreciation in property value over time","The ratio of rent to total area"],"correct_answer":"Net operating income divided by property market value","explanation":"The cap rate (NOI / market value) estimates the return on a real estate investment. A higher cap rate indicates higher yield but often higher risk or weaker market conditions."},{"id":49,"type":"sorting","difficulty":"basic","topic":"Real Assets","question":"Arrange these real estate investment strategies from lowest to highest risk/return:","items":["Opportunistic","Value-Add","Core"],"correct_order":["Core","Value-Add","Opportunistic"],"explanation":"Core real estate offers stable income with minimal risk. Value-add targets improvement opportunities for higher returns. Opportunistic includes development and distressed assets — highest risk, highest potential return."},{"id":50,"type":"true_false","difficulty":"basic","topic":"Risk Management","question":"CVaR (Conditional Value at Risk) provides more information about extreme losses than standard VaR.","correct_answer":true,"explanation":"CVaR (Expected Shortfall) measures the average loss in the worst scenarios beyond the VaR threshold, providing better insight into tail risk severity — not just the probability of loss."},{"id":51,"type":"multiple_choice","difficulty":"pro","topic":"Private Equity","question":"In an LBO, which of the following is NOT a key value creation lever for the private equity firm?","options":["EBITDA growth through operational improvement","Debt paydown using portfolio company cash flows","Multiple expansion at exit","Increasing the company's employee headcount"],"correct_answer":"Increasing the company's employee headcount","explanation":"The three key PE value creation levers are: (1) EBITDA growth, (2) debt paydown/deleveraging, and (3) multiple expansion. Increasing headcount alone is not a value creation lever — productivity matters more."},{"id":52,"type":"true_false","difficulty":"pro","topic":"Private Equity","question":"A European waterfall structure is generally more favorable to LPs than an American waterfall structure.","correct_answer":true,"explanation":"The European waterfall requires the GP to return ALL LP capital and preferred return before receiving any carried interest. The American (deal-by-deal) waterfall allows the GP to receive carry on early profitable exits, creating clawback risk."},{"id":53,"type":"multiple_choice","difficulty":"pro","topic":"Private Equity","question":"A PE firm buys a company for $500M (5x EBITDA of $100M) using 60% debt. After 5 years, EBITDA grows to $130M, debt is repaid to $150M, and the company exits at 7x EBITDA. What is the approximate exit equity value?","options":["$910M","$760M","$760M","$610M"],"correct_answer":"$760M","explanation":"Exit EV = $130M × 7x = $910M. Exit equity = $910M - $150M remaining debt = $760M. Entry equity = $500M × 40% = $200M. MOIC = $760M / $200M = 3.8x."},{"id":54,"type":"sorting","difficulty":"pro","topic":"Private Equity","question":"Arrange these items in the correct order of priority in a typical PE fund waterfall distribution:","items":["GP Carried Interest (20%)","Return of LP Capital","LP Preferred Return (8%)","GP Catch-Up"],"correct_order":["Return of LP Capital","LP Preferred Return (8%)","GP Catch-Up","GP Carried Interest (20%)"],"explanation":"Distributions flow: (1) Return all LP capital → (2) LP preferred return (e.g., 8%) → (3) GP catch-up (until GP has received its carry percentage) → (4) Remaining profits split 80/20."},{"id":55,"type":"true_false","difficulty":"pro","topic":"Private Equity","question":"A subscription line of credit artificially inflates a fund's reported IRR by shortening the period over which LP capital is deployed.","correct_answer":true,"explanation":"By delaying capital calls (using credit to fund deals), the time-weighted IRR increases because LP capital is at risk for a shorter period. This is a known distortion of IRR as a performance metric."},{"id":56,"type":"multiple_choice","difficulty":"pro","topic":"Private Equity","question":"What is a GP-led secondary transaction?","options":["A GP selling the fund management company to a new owner","A transaction where a GP transfers portfolio assets to a new continuation vehicle, offering existing LPs liquidity","An LP selling its fund interest to another institutional investor","A secondary acquisition made by the fund after its initial portfolio is built"],"correct_answer":"A transaction where a GP transfers portfolio assets to a new continuation vehicle, offering existing LPs liquidity","explanation":"In GP-led secondaries, the GP restructures a maturing fund by moving assets to a continuation fund, giving existing LPs the choice to cash out or roll over into the new vehicle."},{"id":57,"type":"multiple_choice","difficulty":"pro","topic":"Venture Capital","question":"A startup raises $10M in a Series A at a $50M pre-money valuation. What percentage equity do Series A investors receive?","options":["10%","16.7%","20%","25%"],"correct_answer":"16.7%","explanation":"Post-money valuation = $50M + $10M = $60M. Investor ownership = $10M / $60M = 16.7%. Understanding pre/post-money distinction is essential in VC dilution analysis."},{"id":58,"type":"true_false","difficulty":"pro","topic":"Venture Capital","question":"A 1x non-participating liquidation preference means investors receive their investment back first, and also participate pro-rata in any remaining proceeds.","correct_answer":false,"explanation":"A non-participating liquidation preference means investors receive 1x their investment OR convert to common stock — they do NOT both receive their preference AND participate in remaining proceeds. That would be a participating liquidation preference."},{"id":59,"type":"multiple_choice","difficulty":"pro","topic":"Venture Capital","question":"In venture capital, what is a 'pro-rata right'?","options":["The right to sell shares in a secondary market","The right to maintain ownership percentage by investing in future rounds","The right to approve or veto major company decisions","The right to receive dividends proportional to ownership"],"correct_answer":"The right to maintain ownership percentage by investing in future rounds","explanation":"Pro-rata rights allow early investors to participate proportionally in subsequent funding rounds to avoid dilution, which is especially valuable when a company is performing well and later rounds price up."},{"id":60,"type":"sorting","difficulty":"pro","topic":"Venture Capital","question":"Rank these SaaS business metrics in order of importance to VC investors evaluating unit economics (most important first):","items":["LTV/CAC Ratio","ARR Growth Rate","Net Revenue Retention (NRR)","Employee Headcount"],"correct_order":["Net Revenue Retention (NRR)","LTV/CAC Ratio","ARR Growth Rate","Employee Headcount"],"explanation":"NRR above 100% signals best-in-class product stickiness. LTV/CAC shows efficiency of go-to-market. ARR growth shows top-line momentum. Employee headcount is an input, not an output metric of quality."},{"id":61,"type":"multiple_choice","difficulty":"pro","topic":"Hedge Funds","question":"A hedge fund has 130% long exposure and 70% short exposure. What are its net and gross exposures?","options":["Net: 60%, Gross: 130%","Net: 60%, Gross: 200%","Net: 200%, Gross: 60%","Net: 70%, Gross: 200%"],"correct_answer":"Net: 60%, Gross: 200%","explanation":"Net exposure = Long - Short = 130% - 70% = 60% (directional bias). Gross exposure = Long + Short = 130% + 70% = 200% (total leverage/capital deployed)."},{"id":62,"type":"true_false","difficulty":"pro","topic":"Hedge Funds","question":"Merger arbitrage involves buying the acquirer's stock and selling the target company's stock.","correct_answer":false,"explanation":"In merger arbitrage, the typical trade is to buy the TARGET (which trades at a discount to the announced deal price) — not the acquirer. The acquirer's stock often declines after announcement."},{"id":63,"type":"multiple_choice","difficulty":"pro","topic":"Hedge Funds","question":"What is the primary risk for a convertible arbitrage strategy?","options":["Interest rate risk from bond duration","Equity tail risk if the stock falls dramatically, reducing both bond and equity value","Credit risk from the bond issuer defaulting on coupon payments","Currency risk from foreign bond exposure"],"correct_answer":"Equity tail risk if the stock falls dramatically, reducing both bond and equity value","explanation":"Convertible arb is typically long convertibles and short equity. In a large equity decline, the convertible's equity option value collapses while the short equity hedge provides only partial protection. Credit deterioration adds further downside."},{"id":64,"type":"multiple_choice","difficulty":"pro","topic":"Hedge Funds","question":"Which hedge fund strategy typically performs best during equity market downturns?","options":["Long/short equity (net long 80%)","Managed futures / trend-following CTAs","Equity market neutral","Event-driven merger arbitrage"],"correct_answer":"Managed futures / trend-following CTAs","explanation":"CTAs historically perform well during equity bear markets because they trend-follow across multiple asset classes and can go short equities and long bonds/defensive assets during market crises."},{"id":65,"type":"true_false","difficulty":"pro","topic":"Hedge Funds","question":"A hedge fund's redemption gate protects the manager from being forced to sell illiquid assets at distressed prices during mass redemptions.","correct_answer":true,"explanation":"A redemption gate limits the percentage of fund assets that can be withdrawn in any period, preventing a liquidity spiral where forced selling of illiquid positions causes further NAV declines and more redemptions."},{"id":66,"type":"multiple_choice","difficulty":"pro","topic":"Commodities","question":"A commodity futures curve is in backwardation. What does this typically signal about the physical market?","options":["Ample storage capacity and excess supply","Low current demand relative to future demand","Current supply is tight relative to immediate demand — physical scarcity premium","The market is in equilibrium with no mispricing"],"correct_answer":"Current supply is tight relative to immediate demand — physical scarcity premium","explanation":"Backwardation reflects strong immediate demand or short supply, making near-term delivery more valuable than future delivery. The convenience yield exceeds storage and financing costs."},{"id":67,"type":"sorting","difficulty":"pro","topic":"Commodities","question":"Rank these components of commodity futures total return from most to least significant in a backwardated market:","items":["Collateral Yield","Spot Price Return","Roll Yield"],"correct_order":["Roll Yield","Spot Price Return","Collateral Yield"],"explanation":"In backwardation, roll yield is the most valuable component as positive rolling generates returns even if spot prices are flat. Spot price movement is also significant but volatile. Collateral yield (T-bill rate on margin) is typically the smallest contributor."},{"id":68,"type":"true_false","difficulty":"pro","topic":"Commodities","question":"The 'crack spread' measures the profit margin for oil refiners, reflecting the difference between crude oil costs and refined petroleum product prices.","correct_answer":true,"explanation":"The crack spread (e.g., 3-2-1 crack) measures refinery margins by comparing crude oil input costs to the value of petroleum products (gasoline, heating oil) produced."},{"id":69,"type":"multiple_choice","difficulty":"pro","topic":"Real Assets","question":"Which statement best describes the difference between brownfield and greenfield infrastructure investments?","options":["Brownfield refers to environmentally contaminated sites; greenfield to clean sites","Brownfield investments are in operational assets with existing cash flows; greenfield investments are in new projects being built from scratch","Brownfield funds use more leverage than greenfield funds","Greenfield investments are in urban areas; brownfield in rural areas"],"correct_answer":"Brownfield investments are in operational assets with existing cash flows; greenfield investments are in new projects being built from scratch","explanation":"Brownfield assets are established, operating infrastructure with predictable revenues. Greenfield assets involve construction and ramp-up risks but offer higher potential returns as compensation."},{"id":70,"type":"multiple_choice","difficulty":"pro","topic":"Real Assets","question":"Why are infrastructure investments considered natural inflation hedges?","options":["Infrastructure assets are denominated in foreign currencies","Infrastructure revenue contracts are often explicitly linked to inflation (CPI) indices","Infrastructure assets can be sold quickly when inflation rises","Infrastructure companies earn dividends that grow with inflation"],"correct_answer":"Infrastructure revenue contracts are often explicitly linked to inflation (CPI) indices","explanation":"Many infrastructure contracts (toll roads, utilities, airports) include explicit CPI linkage, meaning revenues automatically increase with inflation — providing a genuine inflation hedge for pension funds."},{"id":71,"type":"true_false","difficulty":"pro","topic":"Real Assets","question":"A sale-leaseback transaction allows a company to convert owned real estate into cash while retaining operational use of the asset.","correct_answer":true,"explanation":"In a sale-leaseback, a company sells property and simultaneously signs a long-term lease to continue using it. This monetizes the asset and improves liquidity while maintaining business operations."},{"id":72,"type":"multiple_choice","difficulty":"pro","topic":"Risk Management","question":"A portfolio with negative skewness and high kurtosis has which return characteristics?","options":["Frequent small losses and occasional large gains","Symmetric returns with few extreme outcomes","Frequent small gains but occasional catastrophic losses","Consistent medium-sized returns with low volatility"],"correct_answer":"Frequent small gains but occasional catastrophic losses","explanation":"Negative skewness means the left tail is heavy (more extreme losses). High kurtosis (fat tails) means extreme outcomes are more frequent. Together they describe 'picking up nickels in front of a steamroller.'"},{"id":73,"type":"true_false","difficulty":"pro","topic":"Risk Management","question":"During financial crises, correlations between asset classes typically increase toward 1.0, reducing diversification benefits exactly when they are most needed.","correct_answer":true,"explanation":"Correlation breakdown is a well-documented phenomenon: in normal markets, assets diversify well, but during crises (2008, 2020), correlations spike as investors sell everything to raise cash, eliminating diversification."},{"id":74,"type":"multiple_choice","difficulty":"pro","topic":"Risk Management","question":"What is the limitation of VaR as a risk measure during periods of market stress?","options":["VaR assumes markets are perfectly efficient","VaR ignores correlations between assets","VaR based on normal distributions underestimates the probability and severity of fat-tail losses","VaR is only applicable to equity portfolios"],"correct_answer":"VaR based on normal distributions underestimates the probability and severity of fat-tail losses","explanation":"Financial returns exhibit fat tails (excess kurtosis). A VaR model assuming normal distributions will significantly underestimate the likelihood and magnitude of extreme losses — a key failure exposed in 2008."},{"id":75,"type":"sorting","difficulty":"pro","topic":"Risk Management","question":"Arrange these risk types from most to least diversifiable in a well-constructed portfolio:","items":["Systemic/Systematic Risk","Sector Concentration Risk","Idiosyncratic Company Risk","Factor Risk (e.g., value, momentum)"],"correct_order":["Idiosyncratic Company Risk","Sector Concentration Risk","Factor Risk (e.g., value, momentum)","Systemic/Systematic Risk"],"explanation":"Idiosyncratic risk is most easily diversified away. Sector concentration is reduced with broad diversification. Factor risks persist but can be partially hedged. Systematic risk cannot be diversified away."},{"id":76,"type":"multiple_choice","difficulty":"pro","topic":"Portfolio Management","question":"What is the key difference between strategic and tactical asset allocation?","options":["Strategic allocation is done by the GP; tactical by the LP","Strategic allocation sets long-term policy targets; tactical allocation makes short-term deviations based on market views","Strategic allocation uses only equities; tactical uses alternatives","They are the same concept with different names"],"correct_answer":"Strategic allocation sets long-term policy targets; tactical allocation makes short-term deviations based on market views","explanation":"SAA defines the long-term target mix based on return objectives and risk tolerance, rebalanced periodically. TAA deviates from SAA based on short-to-medium-term market opportunities or signals."},{"id":77,"type":"true_false","difficulty":"pro","topic":"Portfolio Management","question":"The Public Market Equivalent (PME) adjusts private equity performance for the timing of cash flows to enable fair comparison with a public market benchmark.","correct_answer":true,"explanation":"PME replicates PE fund cash flows (calls and distributions) in a public index to measure whether the PE fund outperformed what would have been achieved through public market investing."},{"id":78,"type":"multiple_choice","difficulty":"pro","topic":"Portfolio Management","question":"In a risk parity portfolio, what drives the allocation weights?","options":["Equal capital allocation to each asset class","Equal risk contribution from each asset class","Maximizing expected return for a target volatility","Replicating a benchmark index"],"correct_answer":"Equal risk contribution from each asset class","explanation":"Risk parity allocates based on risk contribution rather than capital. Since bonds have lower volatility than equities, they receive higher capital allocation (often leveraged) to contribute equally to portfolio risk."},{"id":79,"type":"true_false","difficulty":"pro","topic":"Portfolio Management","question":"The endowment model's superior long-term performance is primarily due to its concentrated allocation to a few high-conviction stocks.","correct_answer":false,"explanation":"The endowment model (Yale/Harvard) is characterized by diversification across multiple alternative asset classes — private equity, VC, hedge funds, real assets — not concentrated stock picking."},{"id":80,"type":"multiple_choice","difficulty":"pro","topic":"Portfolio Management","question":"What is 'portable alpha'?","options":["Alpha that can be transferred from one fund to another via secondary sale","A strategy that uses derivatives for beta exposure while deploying cash capital to generate alpha in uncorrelated strategies","The excess return that persists after adjusting for all risk factors","A technique for carrying alpha between fiscal years"],"correct_answer":"A strategy that uses derivatives for beta exposure while deploying cash capital to generate alpha in uncorrelated strategies","explanation":"Portable alpha separates alpha generation from market exposure. A fund gains cheap beta via index futures (freeing cash), which is then deployed in a market-neutral hedge fund to generate alpha — combining both in a single portfolio."},{"id":81,"type":"multiple_choice","difficulty":"pro","topic":"Foundations of Alternative Investments","question":"What distinguishes a Qualified Purchaser from an Accredited Investor?","options":["Qualified Purchasers have $5M+ in investments vs $1M net worth for Accredited Investors","Qualified Purchasers are corporations; Accredited Investors are individuals","Qualified Purchasers are regulated by the CFTC; Accredited Investors by the SEC","There is no meaningful legal distinction between the two"],"correct_answer":"Qualified Purchasers have $5M+ in investments vs $1M net worth for Accredited Investors","explanation":"Qualified Purchaser status (requiring $5M+ in investments) is a higher threshold than Accredited Investor ($1M net worth). QPs can invest in 3(c)(7) funds, which can have more than 100 investors."},{"id":82,"type":"true_false","difficulty":"pro","topic":"Foundations of Alternative Investments","question":"A side letter in private equity can grant an LP lower management fees that must be extended to all other LPs with MFN rights.","correct_answer":true,"explanation":"Most Favored Nation (MFN) clauses entitle those LPs to receive any more favorable terms negotiated in side letters with other investors — including fee discounts and enhanced reporting rights."},{"id":83,"type":"multiple_choice","difficulty":"pro","topic":"Venture Capital","question":"What is the purpose of a 'cap table' in venture capital?","options":["To set maximum investment limits per LP","To track equity ownership structure, dilution, and value across all shareholders","To record all board meeting decisions","To document the terms of all outstanding loans"],"correct_answer":"To track equity ownership structure, dilution, and value across all shareholders","explanation":"The cap table shows each investor's equity stake, option holders, dilution from each round, and ownership value under different exit scenarios — essential for managing dilution and understanding exit payouts."},{"id":84,"type":"sorting","difficulty":"pro","topic":"Hedge Funds","question":"Arrange these hedge fund strategies from typically lowest to highest volatility:","items":["Global Macro","Fixed Income Arbitrage","Long/Short Equity (high net)","Market Neutral Equity"],"correct_order":["Fixed Income Arbitrage","Market Neutral Equity","Long/Short Equity (high net)","Global Macro"],"explanation":"Fixed income arb and market neutral aim for low absolute volatility. Long/short equity with high net exposure adds directional risk. Global macro takes concentrated macro bets and typically has the highest volatility."},{"id":85,"type":"true_false","difficulty":"pro","topic":"Private Equity","question":"In a dividend recapitalization, a PE-backed company takes on new debt to pay a special dividend to its PE sponsor.","correct_answer":true,"explanation":"Dividend recaps allow PE sponsors to receive early returns on equity without selling the company, by having the portfolio company borrow and distribute proceeds. This increases company leverage."},{"id":86,"type":"multiple_choice","difficulty":"pro","topic":"Commodities","question":"What does 'convenience yield' represent in commodity markets?","options":["The annual dividend paid by commodity index ETFs","The premium for holding physical inventory rather than futures — reflecting immediate availability value","The yield differential between commodity bonds and government bonds","The yield earned from margin deposits on futures positions"],"correct_answer":"The premium for holding physical inventory rather than futures — reflecting immediate availability value","explanation":"Convenience yield is the implicit benefit of holding physical inventory — the ability to use it immediately in production, especially during supply disruptions when future delivery has no value for current needs."},{"id":87,"type":"true_false","difficulty":"pro","topic":"Risk Management","question":"Delta hedging a long option position requires the investor to continuously adjust their underlying asset position as the option's delta changes.","correct_answer":true,"explanation":"Delta changes as the underlying price moves (this sensitivity is called gamma). Maintaining a delta-neutral hedge requires rebalancing — buying more underlying when it falls and selling when it rises."},{"id":88,"type":"multiple_choice","difficulty":"pro","topic":"Real Assets","question":"What makes digital infrastructure (data centers, cell towers) increasingly attractive as a real asset investment?","options":["Low correlation with technological advancement","Long-term contracted revenues from anchor tenants, growing demand from cloud computing, and physical scarcity","Government guarantee of revenue streams","Minimal capital expenditure requirements"],"correct_answer":"Long-term contracted revenues from anchor tenants, growing demand from cloud computing, and physical scarcity","explanation":"Digital infrastructure combines traditional infrastructure attributes (long-term leases, predictable income) with structural demand growth from cloud computing, 5G, and AI — making it increasingly attractive to institutional investors."},{"id":89,"type":"multiple_choice","difficulty":"pro","topic":"Portfolio Management","question":"Which scenario best describes 'cash drag' in a private equity program?","options":["The GP holding excess cash in the fund earning below-market returns","LPs holding committed but uncalled capital in low-yielding instruments while waiting for capital calls","Portfolio companies generating insufficient free cash flow to service LBO debt","The fund having insufficient cash to meet a margin call"],"correct_answer":"LPs holding committed but uncalled capital in low-yielding instruments while waiting for capital calls","explanation":"LPs must hold committed but uncalled capital in liquid, low-yielding assets (money market funds) until the GP calls it. This drag reduces the effective return on the LP's total PE program commitment."},{"id":90,"type":"true_false","difficulty":"pro","topic":"Hedge Funds","question":"A short squeeze occurs when a heavily shorted stock rises, forcing short sellers to cover their positions, which further drives the stock price up.","correct_answer":true,"explanation":"Short squeezes create a self-reinforcing loop: rising prices force short sellers to buy back shares (cut losses), this buying pressure pushes prices higher, triggering more forced covering — as seen in GameStop in 2021."},{"id":91,"type":"multiple_choice","difficulty":"expert","topic":"Private Equity","question":"A PE fund acquired a company 6 years ago at a 9x EBITDA multiple for $450M (EBITDA of $50M at entry). Today, EBITDA is $80M, debt has been repaid from $300M to $80M, but the exit multiple has compressed to 7x. What is the approximate MOIC on the $150M equity invested?","options":["2.1x","3.0x","4.0x","2.8x"],"correct_answer":"2.8x","explanation":"Exit EV = $80M × 7x = $560M. Exit equity = $560M - $80M debt = $480M. MOIC = $480M / $150M equity invested = 3.2x... But if the equity was $150M (450 - 300), it's actually: $480M / $150M = 3.2x. Closest answer is 3.0x, reflecting the power of operational improvement offsetting multiple compression."},{"id":92,"type":"true_false","difficulty":"expert","topic":"Private Equity","question":"A PE fund with a 1.5x DPI and 0.4x RVPI has a TVPI of 1.9x and has already returned more capital than LPs invested.","correct_answer":true,"explanation":"TVPI = DPI + RVPI = 1.5x + 0.4x = 1.9x. Since DPI = 1.5x (distributions/paid-in capital), LPs have already received 1.5x their invested capital back in actual distributions — meaning they've been fully returned plus 50% more."},{"id":93,"type":"multiple_choice","difficulty":"expert","topic":"Private Equity","question":"In a deal-by-deal (American) waterfall, which scenario creates the greatest clawback risk for a PE GP?","options":["Early investments perform well and the GP takes carry; later investments lose money","All investments are realized in the same year","The fund uses a high hurdle rate across all deals","The LP base consists entirely of sovereign wealth funds"],"correct_answer":"Early investments perform well and the GP takes carry; later investments lose money","explanation":"Under American waterfall, carry paid on early winning deals may exceed what the GP is entitled to once losses on later investments are factored in. The GP may need to return carry — the clawback. This is why LPs often prefer European (whole-fund) waterfalls."},{"id":94,"type":"multiple_choice","difficulty":"expert","topic":"Private Equity","question":"Which of the following BEST explains why IRR can be a misleading performance metric for private equity funds?","options":["IRR does not account for currency risk in international investments","IRR implicitly assumes interim cash flows are reinvested at the same IRR, which is unrealistic for high-performing funds","IRR ignores the impact of management fees on LP returns","IRR only works for funds with a single investment"],"correct_answer":"IRR implicitly assumes interim cash flows are reinvested at the same IRR, which is unrealistic for high-performing funds","explanation":"The reinvestment assumption is IRR's critical flaw. A fund with a 35% IRR implicitly assumes LP distributions are reinvested at 35%, which is almost never achievable. Modified IRR (MIRR) and PME are better alternatives for comparing performance."},{"id":95,"type":"true_false","difficulty":"expert","topic":"Private Equity","question":"NAV-based lending facilities are secured against the GP's management company rather than the fund's portfolio asset values.","correct_answer":false,"explanation":"NAV-based lending is secured against the VALUE of the fund's portfolio companies (the NAV). This is distinct from subscription lines (secured against LP commitments) and GP entity lending (secured against management fees)."},{"id":96,"type":"sorting","difficulty":"expert","topic":"Private Equity","question":"In an LBO capital structure, rank these from highest to lowest seniority (i.e., first to be repaid in liquidation):","items":["Common Equity","Senior Secured Term Loan B","Mezzanine / Subordinated Notes","Second Lien Debt"],"correct_order":["Senior Secured Term Loan B","Second Lien Debt","Mezzanine / Subordinated Notes","Common Equity"],"explanation":"Capital structure seniority: Senior Secured (first lien) → Second Lien → Mezzanine/Subordinated → Equity. Higher seniority means lower risk but lower return; equity is last paid but captures most of the upside."},{"id":97,"type":"multiple_choice","difficulty":"expert","topic":"Venture Capital","question":"A VC invested $10M for 25% of a startup at Series A. At exit, the company is acquired for $50M. If there is a 1x participating liquidation preference and the VC has the same terms as all other preferred shareholders, how much does the VC receive?","options":["$12.5M (25% of $50M)","$10M (liquidation preference only)","$17.5M ($10M preference + 25% of remaining $40M)","$25M"],"correct_answer":"$17.5M ($10M preference + 25% of remaining $40M)","explanation":"With a participating preference, the VC receives: (1) 1x preference = $10M, plus (2) pro-rata share of remaining proceeds = 25% × ($50M - $10M) = $10M. Total = $10M + $10M = $20M. Wait — if multiple preferred shareholders share the $10M pool, the calculation is more complex. For a solo preferred investor: $10M + (25% × $40M) = $10M + $10M = $20M."},{"id":98,"type":"true_false","difficulty":"expert","topic":"Venture Capital","question":"Full ratchet anti-dilution protection is more favorable to investors than weighted average anti-dilution protection.","correct_answer":true,"explanation":"Full ratchet resets the conversion price to match the down round price entirely, regardless of how many shares were issued. Weighted average only partially adjusts based on the number of new shares issued — it is less punitive to founders and less protective for investors."},{"id":99,"type":"multiple_choice","difficulty":"expert","topic":"Venture Capital","question":"Which of the following BEST describes the conflict of interest in VC dual-class share structures?","options":["They benefit LPs at the expense of GPs","Founders retain voting control even after significant ownership dilution, potentially allowing them to override investor governance rights","They prevent secondary sales of founder shares","They require GPs to co-invest alongside the fund at the same terms"],"correct_answer":"Founders retain voting control even after significant ownership dilution, potentially allowing them to override investor governance rights","explanation":"Dual-class structures give founders supervoting shares (e.g., 10 votes per share vs 1 for investors), preserving their control even if their economic ownership drops below 50%. This limits investors' governance power and ability to replace underperforming management."},{"id":100,"type":"multiple_choice","difficulty":"expert","topic":"Hedge Funds","question":"A hedge fund sells a 1-year at-the-money put option on an equity index. Which combination of outcomes is MOST dangerous for this position?","options":["High implied volatility and rising markets","Low realized volatility and flat markets","Large market decline combined with a spike in implied volatility","Rising interest rates and stable equity markets"],"correct_answer":"Large market decline combined with a spike in implied volatility","explanation":"A short put suffers from: (1) delta losses as the index falls below the strike, and (2) vega losses as implied volatility spikes (increases the option's value = short position loss). These typically occur simultaneously in a crash, making it doubly dangerous — classic negative skew/fat tail risk."},{"id":101,"type":"true_false","difficulty":"expert","topic":"Hedge Funds","question":"Statistical arbitrage strategies are exposed to 'factor crowding' risk, where many quantitative funds hold similar positions and simultaneous de-risking can cause sharp price dislocations.","correct_answer":true,"explanation":"The 'quant quake' of August 2007 demonstrated factor crowding: many stat arb funds held similar long-value/short-momentum positions. When one fund deleveraged, it triggered cascading losses across all similar funds simultaneously."},{"id":102,"type":"multiple_choice","difficulty":"expert","topic":"Hedge Funds","question":"What is the theoretical problem with using a single prime broker for all fund operations?","options":["Prime brokers do not allow funds with AUM under $1 billion","If the prime broker fails (like Lehman Brothers in 2008), fund assets may be frozen, preventing redemptions and trade execution","Single prime broker arrangements always result in higher fees","Regulatory rules prohibit using a single prime broker for funds over $500M"],"correct_answer":"If the prime broker fails (like Lehman Brothers in 2008), fund assets may be frozen, preventing redemptions and trade execution","explanation":"Concentration in a single prime broker creates catastrophic counterparty risk. When Lehman failed, client assets were frozen in administration. Post-2008, most institutional hedge funds maintain two or more prime broker relationships."},{"id":103,"type":"multiple_choice","difficulty":"expert","topic":"Hedge Funds","question":"A CTA fund has a Sharpe ratio of 0.5 but a Calmar ratio of 2.0. What does this suggest about the fund's return characteristics?","options":["The fund has modest risk-adjusted returns overall but very limited drawdown risk, suggesting smooth upward trending returns","The fund is poorly managed with inconsistent returns","The fund generates high absolute returns but with high volatility","The fund has negligible performance relative to both risk measures"],"correct_answer":"The fund has modest risk-adjusted returns overall but very limited drawdown risk, suggesting smooth upward trending returns","explanation":"Sharpe of 0.5 means modest excess return per unit of total volatility. But Calmar of 2.0 means the fund's return is 2x its maximum drawdown — indicating excellent capital preservation. This profile suggests consistent, trending returns with occasional volatility but rarely severe drawdowns."},{"id":104,"type":"true_false","difficulty":"expert","topic":"Commodities","question":"A commodity index fund in a sustained contango market will lose money even if commodity spot prices remain completely flat.","correct_answer":true,"explanation":"In contango, rolling futures contracts means selling cheaper expiring contracts and buying more expensive forward contracts — a negative roll yield. Over time, this erodes returns even with no spot price movement."},{"id":105,"type":"multiple_choice","difficulty":"expert","topic":"Commodities","question":"What was the primary reason WTI crude oil futures briefly traded at NEGATIVE prices in April 2020?","options":["Demand destruction from COVID-19 combined with physical storage capacity constraints for the May contract","OPEC announced unlimited production increases","The U.S. government banned oil imports temporarily","Technical trading errors by algorithmic systems"],"correct_answer":"Demand destruction from COVID-19 combined with physical storage capacity constraints for the May contract","explanation":"Holders of the May 2020 WTI futures contract facing physical delivery had nowhere to store crude oil — Cushing, Oklahoma storage was nearly full. They paid buyers to take delivery rather than accept oil they couldn't store, driving prices to -$37/barrel."},{"id":106,"type":"multiple_choice","difficulty":"expert","topic":"Risk Management","question":"Which of the following BEST explains why risk parity strategies can amplify market volatility during rate spikes?","options":["Risk parity funds are required to sell equities when rates rise","Risk parity funds use leverage on bonds; when rates spike, leveraged bond positions lose value and force de-leveraging, which causes correlated selling across asset classes","Risk parity allocations are mandated to stay constant regardless of market conditions","The correlation between bonds and equities becomes permanently positive after rate spikes"],"correct_answer":"Risk parity funds use leverage on bonds; when rates spike, leveraged bond positions lose value and force de-leveraging, which causes correlated selling across asset classes","explanation":"Risk parity's Achilles heel: leveraged bonds suffer significant losses during rate spikes. Forced de-leveraging (selling bonds AND equities to maintain volatility targets) amplifies market moves — a pro-cyclical dynamic that can worsen sell-offs."},{"id":107,"type":"true_false","difficulty":"expert","topic":"Risk Management","question":"The use of historical correlation matrices in VaR models during non-crisis periods significantly overestimates the diversification benefit available during actual market stress events.","correct_answer":true,"explanation":"Historical correlations are measured in normal market conditions where diversification works. But VaR models applied to stress scenarios will overestimate diversification if they use normal-period correlation matrices — crisis correlations are far higher."},{"id":108,"type":"multiple_choice","difficulty":"expert","topic":"Risk Management","question":"What is 'wrong-way risk' in counterparty credit risk management?","options":["The risk that a model generates systematically incorrect predictions","The risk that exposure to a counterparty increases precisely when the counterparty's creditworthiness deteriorates","The risk of taking an unintended directional position in a hedge","The risk of misstating a portfolio's sensitivity to interest rates"],"correct_answer":"The risk that exposure to a counterparty increases precisely when the counterparty's creditworthiness deteriorates","explanation":"Wrong-way risk occurs when credit exposure and counterparty default probability are positively correlated — the worst-case scenario. For example, buying credit protection from a bank on that same bank's bonds: if the bank defaults, your protection becomes worthless exactly when you need it."},{"id":109,"type":"sorting","difficulty":"expert","topic":"Risk Management","question":"Rank these risk measures from most to least informative about the complete risk profile of a fat-tailed distribution:","items":["Standard Deviation","VaR (95%)","CVaR/Expected Shortfall","Maximum Drawdown"],"correct_order":["CVaR/Expected Shortfall","Maximum Drawdown","VaR (95%)","Standard Deviation"],"explanation":"CVaR captures severity beyond VaR threshold. Maximum Drawdown shows actual worst historical loss. VaR gives a loss threshold but ignores what's beyond. Standard deviation is symmetric and underestimates tail risk the most."},{"id":110,"type":"multiple_choice","difficulty":"expert","topic":"Portfolio Management","question":"Why does mean-variance optimization (MVO) often produce extreme, concentrated portfolio weights in practice?","options":["MVO ignores correlations between asset classes","MVO is extremely sensitive to input assumptions (expected returns, correlations) — small changes in inputs cause large portfolio weight swings, often producing corner solutions","MVO cannot handle more than 10 asset classes simultaneously","MVO always maximizes the Sharpe ratio regardless of investor preferences"],"correct_answer":"MVO is extremely sensitive to input assumptions (expected returns, correlations) — small changes in inputs cause large portfolio weight swings, often producing corner solutions","explanation":"MVO is an 'error maximizer' — it amplifies estimation errors. Slight changes in expected return assumptions cause dramatic allocation swings. Practitioners use Black-Litterman, resampled optimization, or robust optimization to address this."},{"id":111,"type":"true_false","difficulty":"expert","topic":"Portfolio Management","question":"The Fama-French five-factor model successfully explains all persistent return differences between hedge fund strategies.","correct_answer":false,"explanation":"While the FF5 model adds profitability and investment factors, it does not capture many alternative risk premia — including carry, trend momentum, volatility risk premium, and liquidity risk premium — that drive significant portions of hedge fund returns."},{"id":112,"type":"multiple_choice","difficulty":"expert","topic":"Portfolio Management","question":"An institutional investor has a 10% target allocation to private equity, currently at 7%, and the public equity market rallies 30% in a year. Which concept describes the resulting problem?","options":["Cash drag","J-Curve effect","The denominator effect — public equity gains increase total AUM, making the illiquid PE allocation appear even further below target","Multiple compression"],"correct_answer":"The denominator effect — public equity gains increase total AUM, making the illiquid PE allocation appear even further below target","explanation":"The denominator effect is a well-known problem for institutional allocators: when liquid asset values rise sharply, the total portfolio AUM (denominator) increases, making fixed illiquid allocations appear as a smaller percentage — pushing them further below target."},{"id":113,"type":"multiple_choice","difficulty":"expert","topic":"Foundations of Alternative Investments","question":"Why does smoothed pricing of illiquid assets in private equity tend to artificially reduce their measured correlation with public markets?","options":["Private equity managers deliberately misreport returns","Appraisal-based valuations are updated infrequently, creating stale prices that don't move with daily market fluctuations — understating true economic correlation","PE funds use mark-to-market accounting which lags public markets by 3 months","Private equity assets are legally required to be valued at cost"],"correct_answer":"Appraisal-based valuations are updated infrequently, creating stale prices that don't move with daily market fluctuations — understating true economic correlation","explanation":"Appraisal smoothing is a significant bias in alternative investment return data. Quarterly fair value estimates don't capture real-time market movements, artificially lowering measured volatility AND correlation with public markets — overstating true diversification benefits."},{"id":114,"type":"true_false","difficulty":"expert","topic":"Foundations of Alternative Investments","question":"Survivorship bias in hedge fund databases causes historical performance records to understate typical hedge fund returns.","correct_answer":false,"explanation":"Survivorship bias OVERSTATES historical performance. Database records typically include only surviving funds (which performed well enough to survive), while failed or liquidated funds are removed — creating an upward-biased view of average performance."},{"id":115,"type":"multiple_choice","difficulty":"expert","topic":"Hedge Funds","question":"What is 'backfill bias' in hedge fund performance databases?","options":["The tendency for hedge fund managers to backdate their inception dates","When funds only submit their track record to a database after performing well, adding past returns retrospectively and biasing the database upward","The tendency for databases to fill in missing data with average industry returns","When managers inflate early returns by including paper trades in their track record"],"correct_answer":"When funds only submit their track record to a database after performing well, adding past returns retrospectively and biasing the database upward","explanation":"Backfill (or instant history) bias occurs because funds voluntarily join databases — they typically do so after establishing a good track record. The historical returns submitted are thus pre-selected for quality, inflating measured database averages."},{"id":116,"type":"multiple_choice","difficulty":"expert","topic":"Real Assets","question":"Why might a pension fund prefer infrastructure investment via an unlisted (private) fund over listed infrastructure stocks, despite higher fees and lower liquidity?","options":["Listed infrastructure provides better inflation linkage","Unlisted infrastructure returns are smoothed by appraisal pricing, reducing short-term volatility that could cause regulatory compliance issues for the pension","Listed infrastructure funds have higher management fees","Pension funds are prohibited from holding listed securities"],"correct_answer":"Unlisted infrastructure returns are smoothed by appraisal pricing, reducing short-term volatility that could cause regulatory compliance issues for the pension","explanation":"For liability-driven investors, appraisal smoothing in private infrastructure funds creates lower reported volatility and higher Sharpe ratios, which can improve regulatory capital treatment and reduce year-to-year funding ratio volatility — despite understating true economic risk."},{"id":117,"type":"true_false","difficulty":"expert","topic":"Real Assets","question":"In a Power Purchase Agreement (PPA) for renewable energy, the offtake price is typically fixed for the life of the contract, eliminating ALL revenue risk for the energy producer.","correct_answer":false,"explanation":"While PPAs fix the price per MWh, they often include volume flexibility provisions (allowing the buyer to curtail takeoff), counterparty credit risk (what if the utility defaults?), and in corporate PPAs, the risk that the buyer's energy needs change. Revenue risk is reduced but not eliminated."},{"id":118,"type":"multiple_choice","difficulty":"expert","topic":"Commodities","question":"What is the 'normal backwardation' theory of commodity futures pricing and who proposed it?","options":["A theory by Sharpe stating that futures prices are biased predictors of future spot prices due to hedger risk premiums","A Keynes-Hicks theory that futures prices are set below expected future spot prices because commodity producers pay hedgers (speculators) a risk premium to take the other side of their hedges","A theory by Fama that commodity futures prices are efficient predictors of future spot prices","A Black-Scholes model adaptation for commodity options pricing"],"correct_answer":"A Keynes-Hicks theory that futures prices are set below expected future spot prices because commodity producers pay hedgers (speculators) a risk premium to take the other side of their hedges","explanation":"Normal backwardation (Keynes/Hicks) proposes that producers selling futures to hedge supply risk accept a discount (below expected future spot price) as compensation to speculators for bearing that risk — creating a systematic return for long speculators."},{"id":119,"type":"multiple_choice","difficulty":"expert","topic":"Venture Capital","question":"A startup has $5M ARR growing 200% YoY, 3% monthly churn, $800 CAC, $2,000 LTV, and is burning $400K/month with $3M in the bank. What is the most critical concern for a VC considering a Series A investment?","options":["The ARR growth rate is too slow","The LTV/CAC ratio of 2.5x is too low, and combined with 3% monthly churn and 7.5 months of runway, the business may not survive long enough to demonstrate product-market fit at scale","The company's team is too small","The Series A valuation is likely too high given the burn rate"],"correct_answer":"The LTV/CAC ratio of 2.5x is too low, and combined with 3% monthly churn and 7.5 months of runway, the business may not survive long enough to demonstrate product-market fit at scale","explanation":"LTV/CAC of 2.5x is below the standard 3x+ threshold. 3% monthly churn implies 30%+ annual churn — extremely high for B2B SaaS. With only 7.5 months of runway ($3M / $400K), the company faces an existential funding risk before fixing unit economics."},{"id":120,"type":"true_false","difficulty":"expert","topic":"Private Equity","question":"Covenant-lite loans are more favorable for private equity sponsors because they reduce the GP's ability to control the borrower through financial triggers.","correct_answer":false,"explanation":"Cov-lite loans are favorable to the BORROWER (PE-backed company), not the lender. They give the PE sponsor more flexibility to operate without breaching financial covenants — GPs benefit from cov-lite as it reduces lender intervention in portfolio company operations."},{"id":121,"type":"multiple_choice","difficulty":"expert","topic":"Portfolio Management","question":"An endowment runs a Cambridge Associates PME analysis and finds its PE portfolio has a PME of 0.95 versus the S&P 500. How should the investment committee interpret this?","options":["The PE portfolio outperformed the S&P 500 by 5%","The PE portfolio underperformed the S&P 500 on a dollar-weighted, timing-adjusted basis — investors would have done better with a passive S&P 500 index fund","The PE portfolio matched public market returns exactly","A PME of 0.95 is considered strong performance for PE"],"correct_answer":"The PE portfolio underperformed the S&P 500 on a dollar-weighted, timing-adjusted basis — investors would have done better with a passive S&P 500 index fund","explanation":"PME < 1.0 means the PE program generated less value than equivalent investments in the public benchmark. After accounting for fees, illiquidity, and the timing of cash flows, the endowment would have been better off in an S&P 500 index fund."},{"id":122,"type":"multiple_choice","difficulty":"expert","topic":"Hedge Funds","question":"The Volcker Rule has had what primary impact on hedge fund operations?","options":["It banned hedge funds from short selling government securities","It restricted banks from proprietary trading and from sponsoring or investing in hedge funds, reducing a key source of capital and talent for the industry","It required all hedge funds with over $1B AUM to register as investment advisers","It mandated that all hedge fund performance fees be deferred by two years"],"correct_answer":"It restricted banks from proprietary trading and from sponsoring or investing in hedge funds, reducing a key source of capital and talent for the industry","explanation":"The Volcker Rule (part of Dodd-Frank) prohibited banks from prop trading and severely limited their investments in and sponsorship of hedge funds and PE funds — reducing capital flowing from banks to funds and causing an exodus of prop desk talent to launch independent hedge funds."},{"id":123,"type":"true_false","difficulty":"expert","topic":"Risk Management","question":"A model with perfect in-sample fit will necessarily produce accurate out-of-sample risk forecasts.","correct_answer":false,"explanation":"Overfitting is a fundamental risk model failure: models that perfectly fit historical data may capture noise rather than signal. In out-of-sample periods (the real world), they often perform worse than simpler models. This is especially dangerous in hedge fund quantitative strategies."},{"id":124,"type":"multiple_choice","difficulty":"expert","topic":"Foundations of Alternative Investments","question":"Which of the following is the MOST accurate criticism of the endowment model for smaller institutional investors?","options":["The endowment model is too conservative for modern portfolios","The endowment model requires minimum commitments, long time horizons, skilled staffing, and access to top-quartile managers — advantages that smaller institutions cannot replicate, leading to underperformance","The endowment model was developed before private equity existed","The endowment model does not work in low interest rate environments"],"correct_answer":"The endowment model requires minimum commitments, long time horizons, skilled staffing, and access to top-quartile managers — advantages that smaller institutions cannot replicate, leading to underperformance","explanation":"The endowment model's success at Yale/Harvard is partly due to first-mover access to the best fund managers, sophisticated in-house teams, and perpetual time horizons. Smaller institutions trying to replicate it face adverse manager selection (getting second-tier funds), higher fee drag, and liquidity mismatches."},{"id":125,"type":"multiple_choice","difficulty":"expert","topic":"Real Assets","question":"What is the primary mechanism by which timberland investments offer protection against BOTH inflation AND market downturns simultaneously?","options":["Timberland is correlated with gold, which is a classic safe haven","Trees continue to grow biologically regardless of economic conditions — inventory can be withheld from market during downturns and harvested during price recoveries, providing optionality","Timberland REITs pay fixed dividends indexed to CPI","Timber prices are set by long-term government contracts"],"correct_answer":"Trees continue to grow biologically regardless of economic conditions — inventory can be withheld from market during downturns and harvested during price recoveries, providing optionality","explanation":"Timberland's unique feature is biological optionality: unlike equipment or financial assets that depreciate in crises, trees simply keep growing. Managers can delay harvesting during pri
